<script>
  function stripMetaLine(str) {
  if (!str) return '';
  // Remove meta info lines like "Q4: Level 1, 1 Mark [Descriptive]"
  return str.replace(/^Q\d+:\s*[^A-Za-z0-9]*[\[\]A-Za-z0-9, ]*\s*/i, '').trim();
}
  function stripMetaTags(str) {
  if (!str) return '';
  // Remove tags anywhere in the text, not only at the beginning
  return str.replace(/\s*\[(?:Descriptive|MCQ|Multiple|Single)\]\s*/gi, '').trim();
}
  function getExamPaper() {
    try {
      return JSON.parse(sessionStorage.getItem("examPaper") || "null");
    } catch {
      return null;
    }
  }
  function setExamPaper(paper) {
    sessionStorage.setItem("examPaper", JSON.stringify(paper));
  }
// --------- Robust parser for AI output ---------
function parseAIBlocks(text, expectedCount) {
  if (!text) return [];
  // normalize
  let t = String(text)
  .replace(/\r/g,'')
  .replace(/&nbsp;/gi,' ')
  .replace(/<br\s*\/?>/gi,'\n')
  .replace(/<\/p>/gi,'\n')
  .replace(/<p[^>]*>/gi,'')          // strip opening <p> so A/B are detected
  .replace(/<div[^>]*>/gi,'\n')
  .replace(/<\/div>/gi,'')
  .replace(/<li[^>]*>/gi,'\n')
  .replace(/<\/li>/gi,'')
  .replace(/<ol[^>]*>|<ul[^>]*>|<\/ol>|<\/ul>/gi,'')
  .trim();
  // strip code fences if present
  t = t.replace(/```(?:\w+)?\n([\s\S]*?)```/g, '$1');

  // 1) Primary: "Q<number> ... :"  (allow ANY chars, including nested parens, until the colon)
  //    No newline before the colon to avoid over-greedy spans.
  let matches = [...t.matchAll(/Q\s*\d+[^\n:]*:/gi)];

  // 2) Fallback: plain numbered lists like "1. " or "2) "
  if (matches.length === 0) {
    matches = [...t.matchAll(/(^|\n)\s*\d+\s*[\.\)]\s+/g)];
  }

  if (matches.length === 0) return [];

  // Build block slices
  const starts = matches.map(m => m.index + (t[m.index] === '\n' ? 1 : 0)).sort((a,b)=>a-b);
  const blocks = [];
  for (let i = 0; i < starts.length; i++) {
    const start = starts[i];
    const end = i + 1 < starts.length ? starts[i + 1] : t.length;
    const chunk = t.slice(start, end).trim();
    if (chunk) blocks.push(chunk);
  }

  // Trim extras if AI returned more than asked
  if (blocks.length > expectedCount) return blocks.slice(0, expectedCount);
  return blocks;
}
  // --- NEW: parse pasted questions (order preserved) ---
function parsePastedQuestions(rawText) {
  if (!rawText) return [];
  const text = String(rawText).replace(/\r/g, '').trim();

  // Split into blocks by: blank lines OR numbered/Q-lines
  const blocks = text.split(/\n{2,}|\n(?=\d+\s*[\.\)]\s)|\n(?=Q\s*\d+[:\.])/i)
                     .map(b => b.trim())
                     .filter(Boolean);

  const items = [];
  for (const block of blocks) {
    // Extract MCQ options A/B/C/D and optional Ans:
    const lines = block.split('\n').map(s => s.trim()).filter(Boolean);

    // Detect options
    const opts = [];
    const optRegex = /^[A-D][\)\.\:]?\s+(.+)$/i;
    lines.forEach(l => {
      const m = l.match(optRegex);
      if (m) opts.push(m[1].trim());
    });

    // Extract answer letters if present anywhere
    let ans = '';
    const am = block.match(/Ans?\s*:\s*([A-D](?:\s*,\s*[A-D])*)/i);
    if (am) {
      const seen = new Set();
      ans = am[1]
        .toUpperCase()
        .split(',')
        .map(s => s.trim())
        .filter(L => /^[A-D]$/.test(L) && !seen.has(L) && (seen.add(L), true))
        .join(seen.size > 1 ? ',' : '');
    }

    // Stem: remove leading "Qx:" or "1)." etc and strip option/answer lines
    let stem = block
  .replace(/^Q\s*\d+\s*[:\.\)]\s*/i, '')
  .replace(/^\d+\s*[\.\)]\s*/, '')
  .replace(/\n?Ans?\s*:.+$/i, '')
  .replace(/\n?[A-D][\)\.\:]?\s+.+$/gmi, '')
  .replace(/\n\s*\(?OR\)?\s*\n/gi, '\n')
  .replace(/\(\s*OR\s*\)/gi, '')
  .trim();

    // Keep LaTeX intact in stem
    if (opts.length === 4) {
      items.push({ text: stem, options: opts, answer: ans });
    } else {
      items.push({ text: stem });
    }
  }
  return items;
}

function sciMentraAlert(message) {
  return new Promise(resolve => {
    const overlay = document.getElementById('scimentra-dialog-overlay');
    const msg = document.getElementById('scimentra-dialog-message');
    const input = document.getElementById('scimentra-dialog-input');
    const okBtn = document.getElementById('scimentra-dialog-ok');
    const cancelBtn = document.getElementById('scimentra-dialog-cancel');

    msg.textContent = message || '';
    input.style.display = 'none';
    cancelBtn.style.display = 'none';
    overlay.style.display = 'flex';

    function cleanup() {
      overlay.style.display = 'none';
      okBtn.onclick = null;
      cancelBtn.onclick = null;
      input.onkeydown = null;
      resolve();
    }

    okBtn.onclick = cleanup;
  });
}

function sciMentraPrompt(message, defaultValue = '') {
  return new Promise(resolve => {
    const overlay = document.getElementById('scimentra-dialog-overlay');
    const msg = document.getElementById('scimentra-dialog-message');
    const input = document.getElementById('scimentra-dialog-input');
    const okBtn = document.getElementById('scimentra-dialog-ok');
    const cancelBtn = document.getElementById('scimentra-dialog-cancel');

          msg.textContent = message || '';
    input.value = defaultValue || '';
    input.style.display = 'block';
    cancelBtn.style.display = 'inline-block';
    input.value = defaultValue || '';
    overlay.style.display = 'flex';

    setTimeout(() => {
  input.focus();
  input.select();
}, 0);

function cleanup(value) {
  overlay.style.display = 'none';
  okBtn.onclick = null;
  cancelBtn.onclick = null;
  input.onkeydown = null;
  resolve(value);
}

okBtn.onclick = () => cleanup(input.value);
cancelBtn.onclick = () => cleanup(null);

input.onkeydown = (e) => {
  if (e.key === 'Escape') cleanup(null);
}; 
  });
}

window.alert = function(message) {
  sciMentraAlert(message);
};

function renderExam() {

    const paper = getExamPaper();
    const area = document.getElementById('exam-review-area');
         if (!paper) {
      area.innerHTML = `<div style="color:#b00;padding:16px;font-size:1.11em;">No exam paper found!<br>Please go back and generate one first.</div>`;
      document.getElementById("save-review-btn").disabled = true;
      document.getElementById("preview-btn").disabled = true;
      return;
    }

    // --- NEW: build questions for sections sourced from Paste (order preserved) ---
(paper.subjects || []).forEach((subjectBlock) => {
  (subjectBlock.sections || []).forEach((sec) => {
    if (sec && sec.sourceType === 'Paste') {
      // If already populated (e.g., user edited earlier), do nothing
      const already = Array.isArray(sec.questions) && sec.questions.length;
      const want = (sec.type === 'internal') ? (sec.numPairs || 0) : (sec.numQuestions || 0);
      if (!already && sec.pastedText) {
        const parsed = parsePastedQuestions(sec.pastedText);
        const take = parsed.slice(0, Math.max(0, want));

        // Map into your question shape
        sec.questions = take.map((q, i) => ({
          number: i + 1,
          text: q.text,
          options: Array.isArray(q.options) ? q.options : undefined,
          answer: q.answer || '',
          marks: sec.marksPerQuestion || ''
        }));

        // If fewer than needed, add a simple notice in instructions
        if (sec.questions.length < want) {
          const miss = want - sec.questions.length;
          sec.instructions = (sec.instructions ? (sec.instructions + ' ') : '') +
            `(Only ${sec.questions.length} available from pasted content; ${miss} missing)`;
        }
      }
    }
  });
});

let html = '';

let qCounter = 0;
(paper.subjects || []).forEach((subjectBlock, subjIdx) => {
      if (paper.instructions) {
  html += `<div class="paper-global-instructions" style="color:#12416c;font-size:1.1em; font-weight:600; background:#f7fafd; padding:10px 18px; border-radius:9px; margin-bottom:22px; text-align:center;">
    ${paper.instructions}
  </div>`;
}
      html += `<h3 style="color:#0f3d6b; margin:22px 0 8px 0;">Subject: ${subjectBlock.subject}</h3>`;
            (subjectBlock.sections || []).forEach((section, sIdx) => {

        // Section Header (centered)
       html += `
  <div class="section-block" style="margin-bottom: 18px;">
    <!-- Centered Section Header -->
    <div class="section-header"
        style="text-align:center; justify-content: center;"
        contenteditable="true"
        spellcheck="true"
        data-subject="${subjIdx}"
        data-section="${sIdx}">
      ${(
  section.label && section.mcqType &&
  !section.label.toUpperCase().includes(section.mcqType.toUpperCase()) &&
  section.mcqType.toUpperCase() !== 'DESCRIPTIVE'
    ? section.label + ` (${section.mcqType})`
    : (section.label || 'Section')
).replace(/\s*\(?\s*descriptive\s*\)?/i, '').trim()
}
      <i class="fas fa-pen edit-icon"></i>
    </div>
    <!-- Instructions and Total in one row -->
    <div class="section-flex-row" style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0; padding:7px 18px 7px 18px;">
  <div style="font-weight: 600; color: #1762a7; font-size: 1.08em; text-align:left;">
    ${
      section.type === "all"
        ? `Answer all ${section.numQuestions} questions`
        : section.type === "any"
          ? `Answer any ${section.attemptAny || section.numQuestions} questions`
          : section.type === "internal"
            ? `Answer all ${section.numPairs} pairs`
            : ""
    }
  </div>
    <div style="font-weight:600; color:#1762a7; font-size:1.08em; text-align:right; min-width:120px;">
    <span contenteditable="plaintext-only" tabindex="0" class="num-questions no-mjx" data-subject="${subjIdx}" data-section="${sIdx}" style="outline:1.2px solid #bcd6ef; border-radius:5px; padding:1px 6px; margin-right:2px;">
      ${section.numQuestions}
    </span>
    x
    <span contenteditable="plaintext-only" tabindex="0" class="marks-per-question no-mjx" data-subject="${subjIdx}" data-section="${sIdx}" style="outline:1.2px solid #bcd6ef; border-radius:5px; padding:1px 6px; margin:0 2px;">
      ${section.marksPerQuestion}
    </span>
    = ${(section.numQuestions * section.marksPerQuestion)} Marks
  </div>
</div>
`;
                (section.questions || []).forEach((q, qIdx) => {
        {
    const fullRaw = stripMetaTags(stripMetaLine(q.text || q.body || q.question || ''));
  const bodyHtml = `
      <span class="question-text" contenteditable="true">${fullRaw}</span>
    `;

  html += `<div class="question-row" data-subject="${subjIdx}" data-section="${sIdx}" data-question="${qIdx}">
    <span class="question-number">${(++qCounter)}.</span>
    <div class="q-body">
      ${bodyHtml}

      ${ (q.options && q.options.length === 4)
        ? `
          <div class="mcq-block" style="display:flex;flex-direction:column;gap:6px;margin-left:8px;flex:1 1 100%;">
            ${['A','B','C','D'].map((L, i) => `
              <div class="mcq-row" data-idx="${i}" style="display:flex;align-items:center;gap:8px;">
                <span style="font-weight:700;color:#185496;min-width:18px;">${L})</span>
                <span class="mcq-opt no-mjx" contenteditable="plaintext-only" tabindex="0" style="flex:1 1 auto;border:1px dashed #bcd6ef;border-radius:6px;padding:3px 8px;">
                    ${(q.options[i] || '').toString()}
                </span>
              </div>
            `).join('')}
            <div class="mcq-ans-row" style="display:flex;align-items:center;gap:8px;margin-top:4px;">
              <span class="marks-label" style="min-width:62px;">Answer</span>
              <span class="answer-box no-mjx" contenteditable="plaintext-only" tabindex="0" style="border:1px solid #bcd6ef;border-radius:6px;padding:3px 8px;min-width:80px;">
                ${(q.answer || '').toString()}
              </span>
              <span class="marks-label" style="opacity:.8;">(use letters like A or A,C)</span>
            </div>
          </div>
        `
        : ''
      }

      <span class="marks-box no-mjx" contenteditable="plaintext-only" tabindex="0">${q.marks || section.marksPerQuestion || ''}</span>
      <span class="marks-label">Marks</span>

      <div class="q-imgwrap" data-qkey="${subjIdx}|${sIdx}|${qIdx}">
        <div class="q-imgbar">
          <button type="button" data-act="pick">Upload</button>
          <button type="button" data-act="fit">Fit</button>
          <button type="button" data-act="zout">-</button>
          <button type="button" data-act="zin">+</button>
          <button type="button" data-act="reset">Reset</button>
          <button type="button" data-act="remove">Remove</button>
          <input type="file" accept="image/png,image/jpeg,image/webp" hidden>
        </div>
        <div class="q-imgbox ${q.image ? '' : 'empty'}" tabindex="0">
          ${q.image ? `<img src="${q.image}" alt="question image">` : ''}
        </div>
        <div class="q-imghint">Tip: Ctrl/Cmd+V to paste, drag & drop to add. Wheel to zoom, drag to pan.</div>
      </div>
    </div>
  </div>`;
}
        });
        html += `</div>`;
      });
    });
    area.innerHTML = html;
    // Instantly update total marks on edit
area.querySelectorAll('.num-questions, .marks-per-question').forEach(el => {
  el.addEventListener('input', function() {
    const subjIdx = +this.dataset.subject, secIdx = +this.dataset.section;
    // Find the other span
    const block = this.closest('.section-flex-row');
    const numQ = parseInt(block.querySelector('.num-questions').textContent.trim()) || 0;
    const marksQ = parseInt(block.querySelector('.marks-per-question').textContent.trim()) || 0;
    // Find the = ... Marks part (it’s always plain text, after the two spans)
    const totalNode = block.childNodes[block.childNodes.length - 1];
    if (totalNode && totalNode.nodeType === 3) {
      totalNode.textContent = ` = ${numQ * marksQ} Marks`;
    }
  });
});
    // Enable MathJax preview for questions/options with click-to-edit
(function () {
  if (!window.__makeEditable) {
    window.__makeEditable = function (el) {
  const raw = el.dataset.raw ?? el.innerHTML ?? '';
  el.dataset.raw = raw;
  el.innerHTML = raw;                // keep HTML (incl. <img>)
  el.setAttribute('contenteditable', 'true'); // allow HTML editing
  el.classList.add('no-mjx');        // pause MathJax while editing
  el.focus();
};
  }
  if (!window.__makePreview) {
    window.__makePreview = function (el) {
  const raw = (el.innerHTML || el.dataset.raw || '').trim();
  el.dataset.raw = raw;

      function applyTransform(){
        const img = box.querySelector('img');
        if (!img) return;
        img.style.transform = `translate(${box._tx}px, ${box._ty}px) scale(${box._scale})`;
      }
      function resetView(){ box._scale = 1; box._tx = 0; box._ty = 0; applyTransform(); }
      function fit(){
        const img = box.querySelector('img'); if (!img) return;
        const bw = box.clientWidth, bh = Math.max(160, box.clientHeight || 160);
        const natural = () => new Promise(res=>{
          if (img.naturalWidth) return res([img.naturalWidth, img.naturalHeight]);
          img.onload = ()=>res([img.naturalWidth, img.naturalHeight]);
        });
        natural().then(([iw, ih])=>{
          if(!iw||!ih) return resetView();
          const s = Math.min(bw/iw, bh/ih);
          box._scale = Math.max(0.1, Math.min(5, s));
          box._tx = 0; box._ty = 0; applyTransform();

      // drag & drop
      box.addEventListener('dragover', e=>{ e.preventDefault(); box.style.borderColor = '#1762a7'; });
      box.addEventListener('dragleave', ()=>{ box.style.borderColor = '#bcd6ef'; });
      box.addEventListener('drop', e=>{

        if (f.size > 20*1024*1024){ alert('Max 20 MB'); return; }
        const r = new FileReader();
        r.onload = ()=> setImg(r.result);
        r.readAsDataURL(f);
      });

      // zoom with wheel
      box.addEventListener('wheel', e=>{
        const img = box.querySelector('img'); if (!img) return;
        e.preventDefault();
        const delta = Math.sign(e.deltaY) * -0.1; // wheel up = zoom in
        const newScale = Math.min(5, Math.max(0.1, box._scale + delta));
        const rect = box.getBoundingClientRect();
        const cx = e.clientX - rect.left - rect.width/2;
        const cy = e.clientY - rect.top  - rect.height/2;
        const factor = newScale / box._scale;
        box._tx = cx - factor*(cx - box._tx);
        box._ty = cy - factor*(cy - box._ty);
        box._scale = newScale;
        applyTransform();
      }, { passive:false });

      // pan by drag
      let dragging = false, sx=0, sy=0;
      box.addEventListener('pointerdown', e=>{
        if (!box.querySelector('img')) return;
        dragging = true; sx = e.clientX; sy = e.clientY; box.setPointerCapture(e.pointerId);
      });
      box.addEventListener('pointermove', e=>{
        if (!dragging) return;

        applyTransform();
      });
      box.addEventListener('pointerup',   ()=> dragging=false);
      box.addEventListener('pointercancel',()=> dragging=false);

      btn('zin')?.addEventListener('click', ()=>{ box._scale=Math.min(5, box._scale+0.2); applyTransform(); });

      btn('remove')?.addEventListener('click', clearImg);
    });
  }

  function makeBatches(items, maxSize = 15, minSize = 12) {
    const chunks = [];
    for (let i = 0; i < items.length; i += maxSize) chunks.push(items.slice(i, i + maxSize));
    if (chunks.length >= 2) {
      const last = chunks[chunks.length - 1];
      const prev = chunks[chunks.length - 2];
      if (last.length < minSize && prev.length > minSize) {
        const need = minSize - last.length;
        const take = Math.min(need, prev.length - minSize);
        if (take > 0) {
          last.unshift(...prev.splice(prev.length - take, take));
        }
      }
    }
    return chunks;
  }

function buildRandomizePrompt(batchQuestions) {
  const header = `
You will receive a batch of questions (mostly numerical). For EACH question:
- Keep the SAME wording/structure; only change numeric values to new reasonable integers (avoid 0/1 unless appropriate).
- Recompute all options so they match the new numbers.
- MCQ (Single): exactly one correct option.
- MCQ (Multiple): 1–4 correct options (you choose per question).
- Randomize intended correct-count distribution across the batch approximately as:
  • 20%: 1 correct option
  • 30%: 2 correct options
  • 30%: 3 correct options
  • 20%: 4 correct options (all correct)
- Never return a question where none of the options are correct.
- Shuffle options AND ensure the answer letters match the shuffled options.
- Preserve any TeX/Math formatting already present (e.g., \\( ... \\)).
- Return STRICT JSON only (no prose, no markdown fences). Each item must be ONE of:
  • MCQ:
    { "stem":"<updated question text>", "options":["A","B","C","D"], "answer":["A"] }  // or ["A","C"] for multiple
  • Descriptive:
    { "stem":"<updated question text>" }  // no options, no answer
- Do not include any extra fields.
[
  { ... }, { ... }, ...
]

Input items (JSON per line):
`.trim();

  const lines = batchQuestions.map((q, idx) => JSON.stringify({
    index: idx + 1,
    subject: q.subject,
    section: q.sectionLabel,
    stem: q.stem,
    options: q.options
  })).join('\n');

  return `${header}\n${lines}\n`;
}

  sub = sub

  return JSON.parse(sub);

    }

    applied++;
  }

  setExamPaper(paper);
  renderExam();

  // Update session progress
  st.appliedCount += applied;
  st.idx++;

  // Guidance & next step
  const btn = document.getElementById('randomize-numbers-btn');
  const guide = document.getElementById('rand-guide');
  if (st.idx >= totalBatches) {
    alert(`All batches applied. Total updates: ${st.appliedCount}.`);
    if (guide) guide.innerHTML = `<b>Done.</b> Applied ${st.appliedCount} updates across ${totalBatches} batches.`;
    btn.innerHTML = '<i class="fas fa-random"></i> Randomize Numbers (Copy Prompt → Open ChatGPT)';
    // Clear session
    delete window.__randState;
    return;
  }

  const nextIdx = st.idx;
  const nextPrompt = buildRandomizePrompt(st.batches[nextIdx]);
  try {
    await navigator.clipboard.writeText(nextPrompt);
    if (guide) guide.innerHTML = `<b>Batch ${nextIdx + 1}/${totalBatches}</b> prompt copied. I opened ChatGPT. Steps:<br>1) Paste & run<br>2) Copy STRICT JSON<br>3) Return → click <i>Paste JSON from ChatGPT</i>`;
    window.open('https://chat.openai.com/', '_blank', 'noopener');
  } catch (e) {
    alert('Copy failed. A window will open with the next prompt for manual copy.');
    const w = window.open('', '_blank', 'noopener,width=900,height=650,scrollbars=yes');
    if (w) { w.document.write(`<pre style="white-space:pre-wrap;font-family:monospace;padding:16px;">${nextPrompt.replace(/[<>&]/g, m => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[m]))}</pre>`); w.document.close(); }
  }
  btn.innerHTML = `<i class="fas fa-random"></i> Copy Batch ${nextIdx + 1}/${totalBatches} Prompt (again)`;
};
</script>
