// SciMentra custom alert + confirm
(function setupSciMentraDialogs(){
  if (!document.getElementById('dlgAppAlert')) {
    const wrapper = document.createElement('div');
    wrapper.innerHTML = `
      <dialog id="dlgAppAlert" style="border:none;border-radius:16px;padding:0;max-width:420px;width:92vw;">
        <div style="background:#0f3d6b;color:#fff;padding:10px 14px;border-radius:16px 16px 0 0;font-weight:600;font-size:15px;text-align:left;">
          SciMentra
        </div>
        <div style="padding:14px 16px 10px 16px;font-size:14px;line-height:1.5;">
          <p id="appAlertText" style="margin:0 0 12px 0;"></p>
          <div style="text-align:right;margin-top:4px;">
            <button id="btnAppAlertOk"
                    style="background:#0f3d6b;color:#fff;border:none;border-radius:999px;padding:6px 16px;font-size:13px;font-weight:600;cursor:pointer;">
              OK
            </button>
          </div>
        </div>
      </dialog>
    `;
    const dialog = wrapper.firstElementChild;
    document.body.appendChild(dialog);

    const textEl = dialog.querySelector('#appAlertText');
    const okBtn  = dialog.querySelector('#btnAppAlertOk');

    function show(msg){
      if (textEl) textEl.textContent = msg;
      dialog.showModal();
    }

    if (okBtn) okBtn.onclick = () => dialog.close();

    window.alert = show;
  }

  if (!document.getElementById('dlgAppConfirm')) {
    const wrapper2 = document.createElement('div');
    wrapper2.innerHTML = `
      <dialog id="dlgAppConfirm" style="border:none;border-radius:16px;padding:0;max-width:420px;width:92vw;">
        <div style="background:#0f3d6b;color:#fff;padding:10px 14px;border-radius:16px 16px 0 0;font-weight:600;font-size:15px;text-align:left;">
          SciMentra
        </div>
        <div style="padding:14px 16px 10px 16px;font-size:14px;line-height:1.5;">
          <p id="appConfirmText" style="margin:0 0 12px 0;"></p>
          <div style="text-align:right;margin-top:4px;display:flex;justify-content:flex-end;gap:8px;">
            <button id="btnAppConfirmCancel"
                    style="background:#eef3f9;color:#35506b;border:none;border-radius:999px;padding:6px 16px;font-size:13px;font-weight:600;cursor:pointer;">
              Cancel
            </button>
            <button id="btnAppConfirmOk"
                    style="background:#0f3d6b;color:#fff;border:none;border-radius:999px;padding:6px 16px;font-size:13px;font-weight:600;cursor:pointer;">
              OK
            </button>
          </div>
        </div>
      </dialog>
    `;
    const dialog2 = wrapper2.firstElementChild;
    document.body.appendChild(dialog2);

    const textEl2 = dialog2.querySelector('#appConfirmText');
    const okBtn2 = dialog2.querySelector('#btnAppConfirmOk');
    const cancelBtn2 = dialog2.querySelector('#btnAppConfirmCancel');

   window.appConfirm = function(msg){
      return new Promise(resolve => {
        if (textEl2) textEl2.textContent = msg;
        dialog2.showModal();

        okBtn2.onclick = () => {
          dialog2.close();
          resolve(true);
        };

        cancelBtn2.onclick = () => {
          dialog2.close();
          resolve(false);
        };
      });
    };
  }

  if (!document.getElementById('dlgAppPrompt')) {
    const wrapper3 = document.createElement('div');
    wrapper3.innerHTML = `
      <dialog id="dlgAppPrompt" style="border:none;border-radius:16px;padding:0;max-width:420px;width:92vw;">
        <div style="background:#0f3d6b;color:#fff;padding:10px 14px;border-radius:16px 16px 0 0;font-weight:600;font-size:15px;text-align:left;">
          SciMentra
        </div>
        <div style="padding:14px 16px 10px 16px;font-size:14px;line-height:1.5;">
          <p id="appPromptText" style="margin:0 0 12px 0;"></p>
          <input id="appPromptInput" type="text"
                 style="width:100%;box-sizing:border-box;padding:10px 12px;border:1.3px solid #bcd6ef;border-radius:10px;font-size:14px;margin-bottom:12px;outline:none;">
          <div style="text-align:right;margin-top:4px;display:flex;justify-content:flex-end;gap:8px;">
            <button id="btnAppPromptCancel"
                    style="background:#eef3f9;color:#35506b;border:none;border-radius:999px;padding:6px 16px;font-size:13px;font-weight:600;cursor:pointer;">
              Cancel
            </button>
            <button id="btnAppPromptOk"
                    style="background:#0f3d6b;color:#fff;border:none;border-radius:999px;padding:6px 16px;font-size:13px;font-weight:600;cursor:pointer;">
              OK
            </button>
          </div>
        </div>
      </dialog>
    `;
    const dialog3 = wrapper3.firstElementChild;
    document.body.appendChild(dialog3);

    const textEl3 = dialog3.querySelector('#appPromptText');
    const inputEl3 = dialog3.querySelector('#appPromptInput');
    const okBtn3 = dialog3.querySelector('#btnAppPromptOk');
    const cancelBtn3 = dialog3.querySelector('#btnAppPromptCancel');

        window.appPrompt = function(msg, defaultValue = ''){
      return new Promise(resolve => {
        if (textEl3) textEl3.textContent = msg;
        if (inputEl3) inputEl3.value = defaultValue || '';
        dialog3.showModal();

        setTimeout(() => {
          if (inputEl3) {
            inputEl3.focus();
            inputEl3.select();
          }
        }, 0);

        okBtn3.onclick = () => {
          const val = inputEl3 ? inputEl3.value : '';
          dialog3.close();
          resolve(val);
        };

        cancelBtn3.onclick = () => {
          dialog3.close();
          resolve(null);
        };
      });
    };
  }

  if (!window.appSelectPdfMode) {
    window.appSelectPdfMode = function() {
      return new Promise(resolve => {
        document.querySelectorAll('.pdf-mode-dialog-overlay').forEach(el => el.remove());

        const overlay = document.createElement('div');
        overlay.className = 'pdf-mode-dialog-overlay';
        overlay.innerHTML = `
          <div style="
            position:fixed;top:0;left:0;width:100vw;height:100vh;
            background:rgba(0,0,0,0.18);z-index:100000;
            display:flex;align-items:center;justify-content:center;
            padding:16px;box-sizing:border-box;">
            
            <div style="
              background:#fff;border-radius:18px;overflow:hidden;
              width:100%;max-width:460px;
              box-shadow:0 8px 28px rgba(0,0,0,0.18);">
              
              <div style="
                background:#0f3d6b;color:#fff;padding:14px 18px;
                font-size:1.08em;font-weight:700;">
                SciMentra
              </div>

              <div style="padding:18px 18px 14px 18px;">
                <div style="font-size:1em;color:#1f2d3d;margin-bottom:14px;line-height:1.5;">
                  Choose PDF type
                </div>

                <input type="hidden" id="pdf-mode-selected" value="worksheet">

                <div class="pdf-mode-card" data-value="worksheet" style="
                  display:flex;align-items:center;justify-content:space-between;
                  padding:14px 14px;margin-bottom:10px;
                  border:2px solid #1762a7;border-radius:14px;
                  cursor:pointer;background:#eef6ff;
                  transition:all 0.15s ease;box-shadow:0 4px 14px rgba(23,98,167,0.10);">
                  <span style="font-weight:700;color:#12416c;">Worksheet only</span>
                  <span class="pdf-mode-tick" style="font-size:1.1em;color:#1762a7;font-weight:900;">✓</span>
                </div>

                                <div class="pdf-mode-card" data-value="worksheet_key" style="
                  display:flex;align-items:center;justify-content:space-between;
                  padding:14px 14px;margin-bottom:8px;
                  border:1.5px solid #cfe0f2;border-radius:14px;
                  cursor:pointer;background:#f9fcff;
                  transition:all 0.15s ease;">
                  <span style="font-weight:700;color:#12416c;">Worksheet + Key</span>
                  <span class="pdf-mode-tick" style="font-size:1.1em;color:transparent;font-weight:900;">✓</span>
                </div>

                               <div style="
                  display:flex;justify-content:flex-end;gap:10px;
                  margin-top:16px;">
                  <button type="button" id="pdf-mode-cancel-btn" style="
                    border:none;border-radius:999px;
                    padding:8px 18px;background:#eef3f9;color:#35506b;
                    font-weight:700;cursor:pointer;">
                    Cancel
                  </button>
                  <button type="button" id="pdf-mode-ok-btn" style="
                    border:none;border-radius:999px;
                    padding:8px 18px;background:#0f3d6b;color:#fff;
                    font-weight:700;cursor:pointer;">
                    OK
                  </button>
                </div>
              </div>
            </div>
          </div>
        `;

        document.body.appendChild(overlay);

        const hidden = overlay.querySelector('#pdf-mode-selected');
        const cards = overlay.querySelectorAll('.pdf-mode-card');

        function setSelected(val) {
          hidden.value = val;
          cards.forEach(card => {
            const active = card.getAttribute('data-value') === val;
            const tick = card.querySelector('.pdf-mode-tick');

            card.style.border = active ? '2px solid #1762a7' : '1.5px solid #cfe0f2';
            card.style.background = active ? '#eef6ff' : '#f9fcff';
            card.style.boxShadow = active ? '0 4px 14px rgba(23,98,167,0.10)' : 'none';
            if (tick) tick.style.color = active ? '#1762a7' : 'transparent';
          });
        }

        cards.forEach(card => {
          card.onclick = function() {
            setSelected(card.getAttribute('data-value'));
          };
        });

        const closeDialog = (value) => {
          overlay.remove();
          resolve(value);

      const { Document, Packer, Paragraph, TextRun } = window.docx;
      const area = document.getElementById('questions-display-area');
      const questions = area.querySelectorAll('.question-item');
      const docChildren = [];

      function decodeAndClean(html) {
        html = html.replace(/<br\s*\/?>/gi, '\n');
        html = html.replace(/<\/?[^>]+(>|$)/g, '');
        const txt = document.createElement('textarea');
        txt.innerHTML = html;
        return txt.value.replace(/\u00a0/g, ' ');
      }

      let qNo = 1;
      for (const q of questions) {
        let qText = decodeAndClean(q.querySelector('.question-text').innerHTML);
        let lines = qText.split('\n').map(l => l.trim()).filter(Boolean);

        let isMCQ = false;
        for (let i = 1; i < lines.length; i++) {
          if (/^[A-Da-d]\)/.test(lines[i]) || /^[A-Da-d][\.\-]/.test(lines[i])) { isMCQ = true; break; }
          if (/^(A|a)[\)\.\-]/.test(lines[i].trim())) { isMCQ = true; break; }
        }
        if (!isMCQ && lines.length > 1 && /(A\).+B\).+C\).+D\))/.test(lines[1])) isMCQ = true;

        const hangingTwips = 700;

        if (isMCQ) {
          let questionLine = lines[0];
          let optionsText = lines.slice(1).join(' ');
          let options = [];

          if (optionsText) {
            let found = optionsText.match(/([A-Da-d]\)[^A-Da-d]*)/g);
            if (found && found.length === 4) {
              options = found.map(o => o.trim());
            } else {
              options = lines.slice(1).filter(x => x).map(x => x.trim());
            }
          } else {
            options = lines.slice(1).filter(x => x).map(x => x.trim());
          }

          docChildren.push(new Paragraph({
            children: [
              new TextRun({ text: qNo + '. ', bold: true, size: 26 }),
              new TextRun({ text: questionLine, size: 26 }),
            ],
            indent: { hanging: hangingTwips, left: 0 },
            spacing: { after: 80 }
          }));

          if (options.length === 4 && options.every(opt => opt.length <= 24)) {
            let runs = [];
            options.forEach((opt, idx) => {
              runs.push(new TextRun({ text: opt, size: 26 }));
              if (idx < options.length - 1) runs.push(new TextRun({ text: "     ", size: 26 }));
            });
            docChildren.push(new Paragraph({
              children: runs,
              indent: { left: hangingTwips, hanging: 0 },
              spacing: { after: 120 }
            }));
          } else if (options.length === 4 && options.every(opt => opt.length <= 40)) {
            docChildren.push(new Paragraph({
              children: [
                new TextRun({ text: options[0], size: 26 }),
                new TextRun({ text: "           ", size: 26 }),
                new TextRun({ text: options[1], size: 26 }),
              ],
              indent: { left: hangingTwips, hanging: hangingTwips },
            }));
            docChildren.push(new Paragraph({
              children: [
                new TextRun({ text: options[2], size: 26 }),

                new TextRun({ text: options[3], size: 26 }),
              ],
              indent: { left: hangingTwips, hanging: hangingTwips },
              spacing: { after: 120 }
            }));
          } else {
            options.forEach(opt => {
              docChildren.push(new Paragraph({
                children: [new TextRun({ text: opt, size: 26 })],
                indent: { left: hangingTwips, hanging: hangingTwips },
              }));
            });
            docChildren.push(new Paragraph({
              children: [new TextRun({ text: "", size: 26 })],

            children: [
              new TextRun({ text: qNo + '. ', bold: true, size: 26 }),

        setTimeout(() => {
          document.body.removeChild(link);
          window.URL.revokeObjectURL(link.href);
        }, 50);
      });

    function createDropdownHTML(id, options, defaultValueText = 'All') {
  const optionsHTML = options.map(opt => `<div data-value="${opt}">${opt}</div>`).join('');
  return `
    <input type="hidden" id="${id}-value" value="All">
    <div class="selected-option">${defaultValueText}</div>
    <div class="dropdown-options">
      <div data-value="All">${defaultValueText}</div>
      ${optionsHTML}
    </div>`;
}

/* ==== Multi-select dropdown helpers (checkbox UI) ==== */
function createMultiDropdownHTML(id, options, label = 'All') {
  const opts = (options || []).map((opt, idx) => {
    const safe = String(opt).replace(/"/g,'&quot;');
    return `
      <label style="display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;">
        <input type="checkbox" class="${id}-chk" value="${safe}">
        <span>${safe}</span>
      </label>`;
  }).join('');

  return `
    <input type="hidden" id="${id}-values" value="">
    <div class="selected-option" id="${id}-chip">${label}</div>
    <div class="dropdown-options" id="${id}-panel" style="padding:6px 0;">
      <div style="display:flex;justify-content:space-between;gap:8px;padding:8px 10px;border-bottom:1px solid #e6eef7;">
        <button type="button" class="msel-all" data-target="${id}" style="background:#f2f7ff;border:1px solid #bdd6ef;border-radius:6px;padding:6px 10px;cursor:pointer;">Select all</button>
        <button type="button" class="msel-clear" data-target="${id}" style="background:#fff;border:1px solid #bdd6ef;border-radius:6px;padding:6px 10px;cursor:pointer;">Clear</button>
        <button type="button" class="msel-done" data-target="${id}" style="background:#1762a7;border:1px solid #1762a7;color:#fff;border-radius:6px;padding:6px 10px;cursor:pointer;">Done</button>
      </div>
      <div style="max-height:220px;overflow:auto;padding:4px 0 6px 0;">
        ${opts || `<div style="padding:10px;color:#666;">No items</div>`}
      </div>
    </div>`;
}

function addMultiDropdownListener(dropdownId, onChange) {
  const dd = document.getElementById(dropdownId);
  const chip = dd.querySelector('.selected-option');
  const panel = dd.querySelector('.dropdown-options');
  const hidden = dd.querySelector('input[id$="-values"]');

  chip.addEventListener('click', (e) => {
    e.stopPropagation();
    dd.classList.toggle('open');
  });

  // prevent outside click handler from closing while interacting inside panel
  panel.addEventListener('click', (e) => {
    e.stopPropagation();

    const btn = e.target.closest('button');
    if (!btn) return;

    const targetId = btn.getAttribute('data-target');
    if (!targetId) return;

    const boxList = dd.querySelectorAll(`input.${targetId}-chk`);
    if (btn.classList.contains('msel-all')) {
      boxList.forEach(b => b.checked = true);
    } else if (btn.classList.contains('msel-clear')) {
      boxList.forEach(b => b.checked = false);
    } else if (btn.classList.contains('msel-done')) {
      dd.classList.remove('open'); // only close on Done
    }
    __updateMultiChip(dd, hidden, chip, onChange);
  });

  // ensure checkbox changes don’t bubble to document click
  panel.addEventListener('change', (e) => {
    e.stopPropagation();
    if (e.target && e.target.matches('input[type="checkbox"]')) {
      __updateMultiChip(dd, hidden, chip, onChange);
    }
  });
}

function __updateMultiChip(dd, hidden, chip, onChange) {
  // base id is like "qtype" from hidden.id = "qtype-values"
  const base = (hidden?.id || '').replace(/-values$/, '');
  const boxes = dd.querySelectorAll(`input.${base}-chk`);
  const selected = Array.from(boxes).filter(b => b.checked).map(b => b.value);

  hidden.value = selected.join('||'); // store as "A||B||C"
  if (selected.length === 0) {
    chip.textContent = 'All';
  } else if (selected.length <= 2) {
    chip.textContent = selected.join(', ');
  } else {
    chip.textContent = `${selected.length} selected`;
  }
  if (typeof onChange === 'function') onChange();
}

function getMultiSelected(idPrefix) {
  const el = document.getElementById(`${idPrefix}-values`);
  if (!el) return [];
  const raw = el.value || '';
  return raw ? raw.split('||').filter(Boolean) : [];
}

    function addDropdownListener(dropdownId, callback, hiddenInputId = null, defaultText = 'Select') {

    ? document.getElementById(hiddenInputId)
    : document.getElementById(`${dropdownId.split('-')[0]}-value`);

    e.stopPropagation();
    dropdown.classList.toggle('open');
  });

  const optionsWrap = dropdown.querySelector('.dropdown-options');
  if (!optionsWrap) return;

  optionsWrap.addEventListener('click', (e) => {
    if (!e.target || !('value' in e.target.dataset)) return;

    const value = e.target.dataset.value;

    if (input) input.value = value;

    dropdown.classList.remove('open');

    if (callback) callback(value);

function bindManualQuizToolbar() {
  const selectAllBtn = document.getElementById('manual-select-all-btn');
  const unselectAllBtn = document.getElementById('manual-unselect-all-btn');

  if (selectAllBtn && !selectAllBtn.dataset.bound) {
    selectAllBtn.dataset.bound = '1';
    selectAllBtn.onclick = function() {
      document.querySelectorAll('.quiz-question-checkbox').forEach(cb => cb.checked = true);
      updateManualQuizToolbar();
    };
  }

  if (unselectAllBtn && !unselectAllBtn.dataset.bound) {
    unselectAllBtn.dataset.bound = '1';
    unselectAllBtn.onclick = function() {
      document.querySelectorAll('.quiz-question-checkbox').forEach(cb => cb.checked = false);
      updateManualQuizToolbar();
    };
  }

  document.querySelectorAll('.quiz-question-checkbox').forEach(cb => {
    if (!cb.dataset.bound) {
      cb.dataset.bound = '1';
      cb.addEventListener('change', updateManualQuizToolbar);
    }
  });

  updateManualQuizToolbar();
}

function autoLatexAll(str) {
      if (!str) return '';
      let match = str.match(/(\$[^\$]+\$)/g);
      if (match && match.length >= 2) {
        let joined = str.replace(/\$([^\$]+)\$/g, '$1');
        str = '$' + joined.replace(/\s*\+\s*/g, ' + ') + '$';
      }
      return str;
    }

    // 3-dot menu actions for each question in Question Bank
    function setupQuestionActionMenus() {
      document.querySelectorAll('.q-action-btn').forEach((btn) => {
        btn.onclick = function(e) {
          e.stopPropagation();

          document.querySelectorAll('.actions-menu').forEach(m => m.remove());

          const questionItem = btn.closest('.question-item');
          const docId = questionItem.getAttribute('data-id');
          const menu = document.createElement('div');
          menu.className = 'actions-menu';

          menu.innerHTML = `
            <button class="menu-show-answer-btn">Show Answer</button>
            <button class="menu-edit-btn">Edit / Meta</button>
            <button class="menu-delete-btn">Delete</button>
          `;
          questionItem.appendChild(menu);

          menu.querySelector('.menu-show-answer-btn').onclick = async (event) => {
            event.stopPropagation();
            let tempAns = questionItem.querySelector('.temp-answer');
            if (tempAns) {
              tempAns.remove();
              menu.querySelector('.menu-show-answer-btn').textContent = 'Show Answer';
              menu.remove();
              return;
            }
            let answer = '';
            try {
              const docSnap = await db.collection('questions').doc(docId).get();
              const data = docSnap.data();
              answer = data.parsedAnswer || data.answer || data.parsedAns || 'No answer available.';
            } catch (e) {
              answer = 'No answer found.';
            }
            const ansDiv = document.createElement('div');
            ansDiv.className = 'temp-answer';
            ansDiv.textContent = answer;
            questionItem.appendChild(ansDiv);
            menu.querySelector('.menu-show-answer-btn').textContent = 'Hide Answer';
            if (window.MathJax && typeof window.MathJax.typesetPromise === 'function') {
              window.MathJax.typesetPromise([ansDiv]);
            }
            menu.remove();
          };

          menu.querySelector('.menu-edit-btn').onclick = async () => {
            menu.remove();
            const docSnap = await db.collection('questions').doc(docId).get();
            const data = docSnap.data();
            showEditPopupForBank(docId, data);
          };

          menu.querySelector('.menu-delete-btn').onclick = async () => {
            menu.remove();
            if (!(await appConfirm("Are you sure you want to delete this question?"))) return;
            await db.collection('questions').doc(docId).delete();
            fetchAndDisplayQuestions();
          };
        };
      });

      document.addEventListener('click', function(event) {
        document.querySelectorAll('.actions-menu').forEach(menu => {
          if (!menu.contains(event.target) && !event.target.closest('.q-action-btn')) {
            menu.remove();
          }
        });
      });
    }

  question: qText,
  difficulty: levelVal || firebase.firestore.FieldValue.delete(),
  board: boardVal || firebase.firestore.FieldValue.delete(),
  chapter: chapterVal || firebase.firestore.FieldValue.delete(),

};

// Normalize old subjects to new ones (Math / Math IIT)
const __oldSub = String((data && data.subject) || '').trim();
let __newSub = __oldSub;

if (__oldSub === 'Math 1' || __oldSub === 'Math 2') __newSub = 'Math';
if (__oldSub === 'Math 1 IIT' || __oldSub === 'Math 2 IIT') __newSub = 'Math IIT';

if (__newSub && __newSub !== __oldSub) updateObj.subject = __newSub;

        if (marksRaw === '') {
          updateObj.marks = firebase.firestore.FieldValue.delete();
        } else {
          const m = Number(marksRaw);
          if (Number.isNaN(m) || m < 0) { alert("Marks must be a positive number."); return; }
          updateObj.marks = m;
        }

        if (qNoRaw === '') {
          updateObj.questionNumber = firebase.firestore.FieldValue.delete();
        } else {
          const qn = Number(qNoRaw);
          if (!Number.isInteger(qn) || qn < 1) { alert("Question No. must be a positive integer."); return; }
          updateObj.questionNumber = qn;
        }

        if (qType === 'Descriptive' || qType === 'Fill in the Blanks') {
          updateObj.mcqType = firebase.firestore.FieldValue.delete();
          updateObj.options = firebase.firestore.FieldValue.delete();
          updateObj.body = qText;
          updateObj.text = qText;
          updateObj.parsedAnswer = firebase.firestore.FieldValue.delete();
        } else {
          const optA = popup.querySelector('#edit-q-optA').value.trim();
          const optB = popup.querySelector('#edit-q-optB').value.trim();
          const optC = popup.querySelector('#edit-q-optC').value.trim();
          const optD = popup.querySelector('#edit-q-optD').value.trim();
          const ans = popup.querySelector('#edit-q-answer').value.trim();
          if (!optA || !optB || !optC || !optD || !ans) {
            alert("For MCQ, all four options and the answer are required.");
            return;
          }
          updateObj.mcqType = qType;
          updateObj.options = [optA, optB, optC, optD];
          updateObj.parsedAnswer = ans;
        }

        try {
          await db.collection('questions').doc(docId).update(updateObj);
          popup.remove();
          fetchAndDisplayQuestions();
        } catch (err) {
          alert("Failed to save: " + err.message);
        }
      };

function __qbEscapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function __qbNormalizeOptions(options) {
  if (!Array.isArray(options)) return [];
  return options.map((opt, i) => {
    const clean = String(opt || '').replace(/^[A-D][).]\s*/, '').trim();
    return `${String.fromCharCode(65 + i)}) ${clean}`;
  });
}

function __qbShuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function __qbShuffleQuestionOptions(questionObj) {
  if (!questionObj || !Array.isArray(questionObj.options) || questionObj.options.length !== 4) {
    return questionObj;
  }

  const rawOptions = questionObj.options.map(opt =>
    String(opt || '').replace(/^[A-D][).]\s*/, '').trim()
  );

  const originalAnswer = String(questionObj.answer || '').toUpperCase().replace(/\s+/g, '');
  const answerLetters = originalAnswer
    .split(',')
    .map(x => x.trim())
    .filter(x => /^[A-D]$/.test(x));

  const indexed = rawOptions.map((text, index) => ({
    oldLetter: String.fromCharCode(65 + index),
    text
  }));

  const shuffled = __qbShuffleArray(indexed);

  const newOptions = shuffled.map((item, idx) => {
    return `${String.fromCharCode(65 + idx)}) ${item.text}`;
  });

  const newAnswerLetters = shuffled
    .map((item, idx) => answerLetters.includes(item.oldLetter) ? String.fromCharCode(65 + idx) : null)
    .filter(Boolean);

  return {
    ...questionObj,
    options: newOptions,
    answer: newAnswerLetters.join(', ')
  };
}

async function __qbLoadTeacherSections() {
  const snap = await db.collection('sections')
    .where('createdBy', '==', currentUser.uid)
    .get();
  const sections = [];
  snap.forEach(doc => {
    const d = doc.data() || {};
    sections.push({
      id: doc.id,
      className: d.className || '',
      sectionName: d.sectionName || '',
      label: `${d.className || ''} - ${d.sectionName || ''}`
    });
  });

  sections.sort((a, b) => {
    const classCompare = String(a.className || '').localeCompare(String(b.className || ''));
    if (classCompare !== 0) return classCompare;
    return String(a.sectionName || '').localeCompare(String(b.sectionName || ''));
  });

  return sections;
}

      const endTime = (document.getElementById('quiz-assign-end').value || '').trim();
      const durationRaw = (document.getElementById('quiz-assign-duration').value || '').trim();

      if (startTime && endTime && new Date(endTime) <= new Date(startTime)) {
        statusEl.textContent = 'End time must be greater than start time.';
        return;
      }

      const durationMinutes = durationRaw ? Number(durationRaw) : null;
      if (durationRaw && (!Number.isInteger(durationMinutes) || durationMinutes < 1)) {
        statusEl.textContent = 'Duration must be a positive whole number.';
        return;
      }

      closeModal({
        assignedSections: checked.map(cb => ({
          sectionId: cb.value,
          className: cb.getAttribute('data-class') || '',
          sectionName: cb.getAttribute('data-section') || ''
        })),

        autoSubmitEnabled: !!document.getElementById('quiz-assign-auto-submit').checked
      });
    };
  });
}

 function __saveQuizModeSettings(mode, randomCount = null) {
    const shuffleQuestionEl = document.getElementById('quiz-shuffle-question-order');
    const shuffleOptionsEl = document.getElementById('quiz-shuffle-options');

    window.__quizSelectionMode = mode;
    window.__quizRandomCount = randomCount;
    window.__quizShuffleQuestionOrder = !!(shuffleQuestionEl && shuffleQuestionEl.checked);
    window.__quizShuffleOptions = !!(shuffleOptionsEl && shuffleOptionsEl.checked);
  }
  document.getElementById('quiz-mode-all').onclick = function() {
    closeModal();
    __saveQuizModeSettings('all', null);
    document.getElementById('quiz-spinner').style.display = 'flex';
    setTimeout(() => {
      document.getElementById('quiz-spinner').style.display = 'none';
      document.getElementById('create-quiz-btn').click();
    }, 100);
  };

  document.getElementById('quiz-mode-manual').onclick = function() {
    closeModal();
    __saveQuizModeSettings('manual', null);
    fetchAndDisplayQuestions();
    setTimeout(() => {
      alert('Now tick the questions you want, then click Create Practice Quiz again.');
    }, 250);
  };

  document.getElementById('quiz-mode-random').onclick = async function() {
    if (!totalDisplayed) {
      closeModal();
      alert('No questions are available to choose randomly.');
      return;
    }

    const raw = await appPrompt('How many questions do you want to choose randomly?\n\nAvailable: ' + totalDisplayed, '');
    if (raw === null) return;

    const count = Number(raw);
    if (!Number.isInteger(count) || count < 1) {
      alert('Please enter a valid positive number.');
      return;
    }
    if (count > totalDisplayed) {
      alert('You entered more than available questions.');
      return;

    closeModal();
    __saveQuizModeSettings('random', count);
    document.getElementById('quiz-spinner').style.display = 'flex';
    setTimeout(() => {
      document.getElementById('quiz-spinner').style.display = 'none';
      document.getElementById('create-quiz-btn').click();
    }, 100);
  };
}

// --- Create Practice Quiz Button Handler ---
document.getElementById('create-quiz-btn').addEventListener('click', async function() {
  if (!window.__quizSelectionMode) {
    showQuizSelectionModePopup();
    return;
  }

  const spinner = document.getElementById('quiz-spinner');
  spinner.style.display = 'flex';

  try {
    const displayArea = document.getElementById('questions-display-area');
    const allNodes = Array.from(displayArea.querySelectorAll('.question-item'));
    let nodes = allNodes;

    if (window.__quizSelectionMode === 'manual') {
      nodes = allNodes.filter(item => {
        const cb = item.querySelector('.quiz-question-checkbox');
        return cb && cb.checked;
      });
    }

    if (window.__quizSelectionMode === 'random') {
      const shuffled = __qbShuffleArray(allNodes);
      nodes = shuffled.slice(0, Number(window.__quizRandomCount || 0));
    }

    if (window.__quizSelectionMode === 'all' && window.__quizShuffleQuestionOrder) {
      nodes = __qbShuffleArray(nodes);
    }
    if (window.__quizSelectionMode === 'manual' && window.__quizShuffleQuestionOrder) {
      nodes = __qbShuffleArray(nodes);
    }
    if (window.__quizSelectionMode === 'random' && window.__quizShuffleQuestionOrder) {
      nodes = __qbShuffleArray(nodes);
    }

    if (nodes.length < 1) {
      alert(
        window.__quizSelectionMode === 'manual'
          ? "Please select at least one question for this quiz!"
          : "No questions found for this quiz!"
      );
      window.__quizSelectionMode = null;
      window.__quizRandomCount = null;
      window.__quizShuffleQuestionOrder = false;
      window.__quizShuffleOptions = false;
      updateManualQuizToolbar();
      spinner.style.display = 'none';
      return;
    }

    const confirmMsg =
      window.__quizSelectionMode === 'manual'
        ? `Total available: ${allNodes.length}\nSelected: ${nodes.length}\n\nCreate quiz with selected questions?`
        : window.__quizSelectionMode === 'random'
          ? `Total available: ${allNodes.length}\nRandomly selected: ${nodes.length}\n\nCreate quiz now?`
          : `Total available: ${allNodes.length}\nSelected: ${nodes.length}\n\nCreate quiz with all displayed questions?`;

    if (!(await appConfirm(confirmMsg))) {
      spinner.style.display = 'none';
      return;
    }

    const questions = [];
    for (const item of nodes) {
      const docId = item.getAttribute('data-id');
      if (!docId) continue;

      const snap = await db.collection('questions').doc(docId).get();
      const data = snap.data() || {};

            let qObj = {
        questionId: docId,
        question: data.question || data.body || data.text || '',
        options: __qbNormalizeOptions(data.options || []),
        answer: data.parsedAnswer || data.answer || '',
        explanation: data.explanation || data.solution || data.explain || '',
        level: data.difficulty || data.level || '',
        marks: Number(data.marks || 0),
        chapter: data.chapter || '',
        type: data.mcqType || data.type || (Array.isArray(data.options) && data.options.length === 4 ? 'MCQ (Single)' : 'Descriptive'),
        board: data.board || '',
        subject: data.subject || '',
        image: data.image || '',
        originalQuestionNumber: data.questionNumber ?? null
      };
      if (window.__quizShuffleOptions) {
        qObj = __qbShuffleQuestionOptions(qObj);
      }

      questions.push(qObj);
    }

    if (!questions.length) {
      alert('No valid questions were prepared for this quiz.');
      spinner.style.display = 'none';
      return;
    }

    const classVal = document.getElementById('class-value').value || '';
    const boardVal = document.getElementById('board-value').value || '';
    const subjectVal = document.getElementById('subject-value').value || '';
    const chapterVal = (getMultiSelected('chapter').join(', ') || 'All');
    const levelVal = (getMultiSelected('level').join(', ') || 'Mixed');
    const qtypeVal = (getMultiSelected('qtype').join(', ') || 'All');
    const marksVal = (getMultiSelected('marks').join(', ') || 'All');

    const schoolName = await appPrompt("Enter School Name", "SciMentra");
    if (schoolName === null) {
      spinner.style.display = 'none';
      return;
    }
    const finalSchoolName = (schoolName || '').trim() || 'SciMentra';

    const quizTitleInput = await appPrompt("Enter Quiz Title", `${subjectVal} Practice Quiz`);
    if (quizTitleInput === null) {
      spinner.style.display = 'none';
      return;
    }
    const finalQuizTitle = (quizTitleInput || '').trim() || `${subjectVal} Practice Quiz`;

    const quizPayload = {
      createdBy: currentUser.uid,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      schoolName: finalSchoolName,
      quizTitle: finalQuizTitle,
      class: classVal,
      board: boardVal,
      subject: subjectVal,
      chapter: chapterVal,
      level: levelVal,
      questionType: qtypeVal,
      marksFilter: marksVal,
      selectionMode: window.__quizSelectionMode || 'all',
      randomCount: window.__quizSelectionMode === 'random' ? Number(window.__quizRandomCount || 0) : null,
      shuffleQuestionOrder: !!window.__quizShuffleQuestionOrder,
      shuffleOptions: !!window.__quizShuffleOptions,
      totalAvailableBeforeSelection: allNodes.length,
      totalQuestions: questions.length,
      questions: questions,
      assignmentReady: true
    };

    const assignmentSettings = await __qbOpenAssignmentPopup(quizPayload);
    if (!assignmentSettings) {
      spinner.style.display = 'none';
      return;
    }

    const quizDoc = await db.collection('quizzes').add({
      ...quizPayload,
      quizStatus: assignmentSettings.quizStatus,
      startTime: assignmentSettings.startTime || null,
      endTime: assignmentSettings.endTime || null,
      durationMinutes: assignmentSettings.durationMinutes || null,
      attemptRule: assignmentSettings.attemptRule || 'single',
      allowLeaderboard: !!assignmentSettings.allowLeaderboard,
      autoSubmitEnabled: !!assignmentSettings.autoSubmitEnabled,
      assignedSectionIds: assignmentSettings.assignedSections.map(x => x.sectionId),
      assignedSections: assignmentSettings.assignedSections
    });

    const quizId = quizDoc.id;
    const assignmentLinks = [];

    for (const sec of assignmentSettings.assignedSections) {
      const assignmentDoc = await db.collection('quizAssignments').add({
        createdBy: currentUser.uid,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        quizId: quizId,
        schoolName: finalSchoolName,
        quizTitle: finalQuizTitle,
        class: classVal,
        board: boardVal,
        subject: subjectVal,
        chapter: chapterVal,
        level: levelVal,
        totalQuestions: questions.length,
        sectionId: sec.sectionId,
        className: sec.className,
        sectionName: sec.sectionName,
        quizStatus: assignmentSettings.quizStatus,
        startTime: assignmentSettings.startTime || null,
        endTime: assignmentSettings.endTime || null,
        durationMinutes: assignmentSettings.durationMinutes || null,
        attemptRule: assignmentSettings.attemptRule || 'single',
        allowLeaderboard: !!assignmentSettings.allowLeaderboard,
        autoSubmitEnabled: !!assignmentSettings.autoSubmitEnabled,
        isActive: assignmentSettings.quizStatus !== 'closed'
      });

      const assignmentId = assignmentDoc.id;
      const quizLink = `${window.location.origin}/QBank/quiz.html?quiz=${encodeURIComponent(quizId)}&assignment=${encodeURIComponent(assignmentId)}`;

      await assignmentDoc.update({
        assignmentLink: quizLink
      });

      assignmentLinks.push({
        assignmentId,
        className: sec.className,
        sectionName: sec.sectionName,
        link: quizLink
      });
    }

    __qbOpenShareModal({
      schoolName: finalSchoolName,
      quizTitle: finalQuizTitle,
      className: classVal,
      subjectName: subjectVal,
      chapterName: chapterVal,
      levelName: levelVal,
      totalQuestions: questions.length,
      assignmentLinks
    });

    if (window.__quizSelectionMode === 'manual') {
      document.querySelectorAll('.quiz-question-checkbox').forEach(cb => cb.checked = false);
    }

    window.__quizSelectionMode = null;
    window.__quizRandomCount = null;
    window.__quizShuffleQuestionOrder = false;
    window.__quizShuffleOptions = false;
    updateManualQuizToolbar();

  } catch (err) {
    alert("Quiz creation failed: " + err.message);
  }

  spinner.style.display = 'none';
});
  </script>

  <!-- Quiz Creation Spinner -->
  <div id="quiz-spinner" style="
    display:none; position:fixed; top:0; left:0; width:100vw; height:100vh;
    background:rgba(0, 0, 0, 0.15); z-index:9999; align-items:center; justify-content:center;">
    <div style="
      background:#fff; padding:32px 28px; border-radius:18px; box-shadow:0 4px 24px #0f3d6b25;
      display:flex; flex-direction:column; align-items:center;">
      <i class="fa fa-spinner fa-spin" style="font-size:2.6em;color:#1762a7;margin-bottom:12px;"></i>
      <span style="color:#1762a7;font-weight:bold;font-size:1.13em;">Creating Quiz... Please wait</span>
    </div>
  </div>
</body>
