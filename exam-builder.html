// --- Helpers for MCQ logic (keep as-is) ---
function extractMCQOptions(q) {
  // Returns [A,B,C,D] or null
  if (Array.isArray(q?.options) && q.options.length === 4) return q.options;

  let s = String(q?.question || q?.text || '');
  s = s.replace(/\r/g, ''); // normalize

  // Find label positions for A)/B)/C)/D) OR A./B./C./D. (case-insensitive)
  const labelRe = /(^|\s)([ABCD])[\)\.]\s/gi;
  const hits = [];
  let m;
  while ((m = labelRe.exec(s)) !== null) {
    // start index after the label token (e.g., after "A) " or "B. ")
    hits.push({ letter: m[2].toUpperCase(), i: m.index + m[0].length });
  }

  // Need exactly A,B,C,D in order
  const need = ['A', 'B', 'C', 'D'];
  const map = {};
  for (const h of hits) {
    if (!(h.letter in map)) map[h.letter] = h.i;
  }
  if (!need.every(L => map[L] != null)) return null;

  const endA = map['B'];
  const endB = map['C'];
  const endC = map['D'];
  const ansIdx = (s.match(/\bAns?\s*:/i)?.index) ?? s.length;
  const endD = ansIdx;

  const A = s.slice(map['A'], endA).trim();
  const B = s.slice(map['B'], endB).trim();
  const C = s.slice(map['C'], endC).trim();
  const D = s.slice(map['D'], endD).trim();

  return [A, B, C, D];
}
function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}
function shuffleMCQQuestion(questionObj) {
    if (!questionObj.options || !questionObj.options.length) return questionObj;
    let { options, answer } = questionObj;
    let correctIndices = [];
    if (typeof answer === 'string') {
      const ansMatches = String(answer).toUpperCase().match(/[A-D]/g);
      if (ansMatches) correctIndices = ansMatches.map(l => "ABCD".indexOf(l));
    } else if (Array.isArray(answer)) {
      if (answer.length && typeof answer[0] === 'string') {
        correctIndices = answer
          .map(l => "ABCD".indexOf(String(l).toUpperCase()))
          .filter(i => i >= 0);
      } else {
        correctIndices = answer; // assume indices
      }
    }
    const optPairs = options.map((opt, idx) => ({ opt, idx }));
    shuffleArray(optPairs);
    const newOptions = optPairs.map(p => p.opt);
    const newCorrectIndices = optPairs.map((p, newIdx) => (correctIndices.includes(p.idx) ? newIdx : null)).filter(x => x !== null);
    const ansStr = "Ans: " + newCorrectIndices.map(i => "ABCD"[i] + ")").join(", ");
    return { ...questionObj, options: newOptions, answer: ansStr };
}
function splitCounts(total, percents) {
    let result = percents.map(p => Math.floor(total * p / 100));
    let sum = result.reduce((a, b) => a + b, 0);
    let diff = total - sum;
    for (let i = 0; diff > 0; i++, diff--) result[i % result.length]++;
    return result;
}
    // NEW: HTML → plain text (handles <p>, <br>, lists, entities)
function htmlToPlainText(html) {
  if (!html) return '';
  let s = String(html);

  // normalize line breaks for block-ish tags
  s = s.replace(/<\/p\s*>/gi, '\n')
       .replace(/<br\s*\/?>/gi, '\n')
       .replace(/<\/li\s*>/gi, '\n')
       .replace(/<\/h[1-6]\s*>/gi, '\n');

  // strip remaining tags
  s = s.replace(/<[^>]+>/g, ' ');

  // decode basic entities & nbsp
  s = s.replace(/&nbsp;/gi, ' ')
       .replace(/&amp;/gi, '&')
       .replace(/&lt;/gi, '<')
       .replace(/&gt;/gi, '>')
       .replace(/&#39;/gi, "'")
       .replace(/&quot;/gi, '"');

  // collapse whitespace
  s = s.replace(/\r/g, '')
     .replace(/\u00A0/g, ' ')
     .replace(/[ \t]+\n/g, '\n')     // keep the newline
     .replace(/[ \t]{2,}/g, ' ')     // collapse spaces/tabs ONLY
     .replace(/\n{2,}/g, '\n\n')     // keep blank-line separators
     .trim();

  // restore paragraph-ish breaks a little
  s = s.replace(/\n/g, '\n');
  return s;
}

// NEW: turn a pasted or extracted text into an ordered pool of question strings
function parsePastedQuestionsToPool(raw) {
  if (!raw) return [];
  let text = String(raw);

  // If it looks like HTML, flatten it first
  if (/<[a-z][\s\S]*>/i.test(text)) {
    text = htmlToPlainText(text);
  } else {
    text = text.replace(/\r/g, '').trim();
  }
  if (!text) return [];

  // Merge lonely number lines like "8." / "8)" into the next line
  const lines = text.split('\n');
  const merged = [];
  for (let i = 0; i < lines.length; i++) {
    const cur = lines[i].trim();
    if (/^(?:Q\.?\s*)?\d+\s*[\.\)]?$/.test(cur) && i + 1 < lines.length) {
      lines[i + 1] = `${cur} ${lines[i + 1]}`;
      continue;
    }
    merged.push(lines[i]);
  }
  const norm = merged.join('\n');

  // Header at start of line:
  //   Q1. / Q.1) / 1) / 1.  (with at least one space after)
  const headerRe = /^[ \t]*(?:Q\.?\s*)?(\d+)(?:[\.\)]|\s)\s*/gmi;

  // Collect all starts (no monotonic filtering; many docs restart numbering per section)
  const starts = [];
  let m;
  while ((m = headerRe.exec(norm)) !== null) {
    starts.push(m.index);
  }
  if (!starts.length) {
  // split by blank lines so multi-line questions stay together
  const byLines = norm.split(/\n{2,}/).map(s => s.trim()).filter(Boolean);
  return byLines.length ? byLines : [norm.trim()];
}

  // Build blocks from each header to the next
  const blocks = [];
  for (let i = 0; i < starts.length; i++) {
    const start = starts[i];
    const end = i + 1 < starts.length ? starts[i + 1] : norm.length;
    const slice = norm.slice(start, end);
    // strip leading header only
    const cleaned = slice.replace(/^[ \t]*(?:Q\.?\s*)?\d+(?:[\.\)]|\s)\s*/, '').trim();
    if (cleaned) blocks.push(cleaned);
  }
  return blocks;
}

// --- DEDUPE HELPERS (new) ---
function normalizeText(s) {
  if (!s) return '';
  let t = String(s);

  // strip HTML tags
  t = t.replace(/<[^>]+>/g, ' ');

  // HTML entities & non-breaking spaces
  t = t.replace(/&nbsp;/gi, ' ').replace(/\u00A0/g, ' ');

  // Unicode canonicalization
  try { t = t.normalize('NFKC'); } catch (e) {}

  // remove zero-width/invisible characters
  t = t.replace(/[\u200B-\u200D\uFEFF]/g, '');

  // unify dashes & minus (en/em/hyphen/minus → '-')
  t = t.replace(/[\u2010-\u2015\u2212]/g, '-');

  // unify quotes
  t = t.replace(/[\u2018\u2019\u201A\u2032]/g, "'")
       .replace(/[\u201C\u201D\u2033]/g, '"');

  // unify multiplication sign × to 'x'
  t = t.replace(/\u00D7/g, 'x');

  // collapse whitespace
  t = t.replace(/\s+/g, ' ').trim().toLowerCase();

  // ignore trivial trailing punctuation differences
  t = t.replace(/[.,;:!?]+$/g, '');

  return t;
}

// === STEM-ONLY de-dupe key (ignores options/answers). Adds marks for stability ===
function makeStemKey(q) {
  let raw = String(q?.question || q?.text || '');

  // strip HTML + common prefixes/suffixes
  raw = raw.replace(/<[^>]+>/g, ' ');
  raw = raw.replace(/^Q\d+:\s*[^A-Za-z0-9]*[\[\]A-Za-z0-9, ]*\s*/i, ''); // "Q4: Level 1, 1 Mark ..."
  raw = raw.replace(/\bAns?\s*:\s*.*$/i, '');                           // trailing "Ans: ..."
  raw = raw.replace(/\s*(?:\(?\s*A\s*[\)\.])[\s\S]*$/i, '');            // cut inline options from "A)" onward

  const stemNorm = normalizeText(raw);
  const marks = (q && q.marks != null) ? String(q.marks) : '';
  return stemNorm + '|m=' + String(marks ?? '');
}

// Build a stable de-dupe key from a question object
function makeDeDupeKey(q) {
  // 1) Base stem (strip html, inline options, answers)
  let raw = String(q?.question || q?.text || '');
  raw = raw.replace(/<[^>]+>/g, ' ');                          // drop HTML
  raw = raw.replace(/^Q\d+:\s*[^A-Za-z0-9]*[\[\]A-Za-z0-9, ]*\s*/i, ''); // drop "Q4: [..]" prefixes
  raw = raw.replace(/\bAns?\s*:\s*.*$/i, '');                  // remove trailing "Ans: ..."
  raw = raw.replace(/\s*(?:\(?\s*A\s*[\)\.])[\s\S]*$/i, '');   // remove inline options from first "A)" onward
  const stemNorm = normalizeText(raw);                         // your existing normalizer

  // 2) MCQ type (canonical)
  const typeNorm = normalizeMcqType(q?.mcqType);

  // 3) Options (canonicalize BEFORE any shuffle)
  //    Prefer q.options; else parse inline via your existing extractor.
  const rawOpts = Array.isArray(q?.options) ? q.options.slice(0, 4) : (extractMCQOptions(q) || []);
  const optNormsInOrder = rawOpts.map(o => normalizeChoice(o)).filter(Boolean);

  // 4) Correct answer(s) as texts (use letters if present)
  const ansLetters = extractAnswerLetters(q?.answer); // ["A"], ["A","C"], or []
  const ansTexts = ansLetters.length && optNormsInOrder.length === 4
    ? ansLetters.map(L => {
        const idx = "ABCD".indexOf(L);
        return idx >= 0 ? optNormsInOrder[idx] : '';
      }).filter(Boolean).sort()
    : []; // if unknown, leave empty

  // 5) Option signature as a SET (order-independent)
  const optionSet = Array.from(new Set(optNormsInOrder)).sort();

  // 6) Build fingerprint (no marks here; uniqueByIdOrText appends marks)
  //    Include type+options+answers so different variants won’t collapse.
  const key =
    stemNorm +
    '||t=' + (typeNorm || '') +
    '||opts=' + optionSet.join('|') +
    '||ans=' + ansTexts.join('|');

  return key;
}

// Helpers used above
function normalizeChoice(s) {
  if (!s) return '';
  let t = String(s);
  t = t.replace(/^[A-D][\)\.]\s*/i, '');         // require ) or . after A–D
  t = t.replace(/<[^>]+>/g, ' ').replace(/&nbsp;/gi, ' ').replace(/\u00A0/g, ' ');
  try { t = t.normalize('NFKC'); } catch (e) {}
  t = t.replace(/[\u200B-\u200D\uFEFF]/g, '');    // zero-width
  t = t.replace(/[\u2010-\u2015\u2212]/g, '-');   // dashes
  t = t.replace(/[\u2018\u2019\u201A\u2032]/g, "'").replace(/[\u201C\u201D\u2033]/g, '"');
  t = t.replace(/\u00D7/g, 'x');                  // × → x
  t = t.replace(/\s+/g, ' ').trim().toLowerCase();
  t = t.replace(/[.,;:!?]+$/g, '');
  return t;
}
function extractAnswerLetters(ans) {
  if (!ans) return [];
  if (Array.isArray(ans)) {
    return ans.map(x => String(x)).map(s => s.toUpperCase()).filter(s => /^[ABCD]$/.test(s));
  }
  const m = String(ans).toUpperCase().match(/[A-D]/g);
  return m ? m : [];
}
function normalizeMcqType(s) {
  const t = String(s || '').trim().toLowerCase();
  if (!t) return 'Descriptive';                 // keep your old behavior for missing type
  if (t.includes('single'))   return 'MCQ (Single)';
  if (t.includes('multiple') || t.includes('multi')) return 'MCQ (Multiple)';
  if (t.includes('desc'))     return 'Descriptive';
  return s; // unknown → leave as-is
}

// NEW: robust type inference (used everywhere we filter by MCQ type)
function inferMcqType(d){
  const norm = normalizeMcqType(d?.mcqType);
  if (norm === 'MCQ (Single)' || norm === 'MCQ (Multiple)' || norm === 'Descriptive') return norm;

  // Fallback by inspecting answer/options
  const letters = String(d?.answer || '').toUpperCase().match(/[A-D]/g) || [];
  if (letters.length > 1) return 'MCQ (Multiple)';
  if (Array.isArray(d?.options) && d.options.length === 4) return 'MCQ (Single)';
  return 'Descriptive';
}

async function fetchQuestions({
  selectedClass,
  selectedSubject,
  chapters,
  marksPerQuestion,
  mcqType,
  count,
  forceDifficulty
}) {
  const firestore = firebase.firestore();

  const base = firestore.collection("questions")
    .where("class", "==", selectedClass)
    .where("subject", "==", selectedSubject);

  // Apply all non-chapter filters here
  const applyNonChapterFilters = (q) => {
  if (forceDifficulty) {
    q = q.where("difficulty", "==", forceDifficulty);
  } else if (window.difficultyFilter && window.difficultyFilter !== "Mixed") {
    q = q.where("difficulty", "==", window.difficultyFilter);
  }
  if (marksPerQuestion) q = q.where("marks", "==", parseInt(marksPerQuestion));
  // Do NOT add mcqType equality here; we’ll filter after fetch using normalizeMcqType().
  return q;
};

  const selectedChapters = Array.isArray(chapters) ? chapters.filter(Boolean) : [];
  let allQuestions = [];

  if (selectedChapters.length > 10) {
    // Batch by 10 to respect Firestore "in" limit
    for (const batch of chunk(selectedChapters, 10)) {
      let q = applyNonChapterFilters(base.where("chapter", "in", batch));
      const snap = await q.get();
      snap.forEach(doc => allQuestions.push({ id: doc.id, ...doc.data() }));
      // Optional soft cap to avoid pulling thousands before shuffle/dedupe
      if (count && allQuestions.length >= count * 3) { break; }
    }
  } else {
    let q = applyNonChapterFilters(base);
    if (selectedChapters.length) q = q.where("chapter", "in", selectedChapters);
    const snap = await q.get();
    snap.forEach(doc => allQuestions.push({ id: doc.id, ...doc.data() }));
  }

  // Filter by type in memory using robust inference
if (mcqType === "Descriptive") {
  allQuestions = allQuestions.filter(d => inferMcqType(d) === "Descriptive");
} else if (mcqType === "MCQ (Single)") {
  allQuestions = allQuestions.filter(d => inferMcqType(d) === "MCQ (Single)");
} else if (mcqType === "MCQ (Multiple)") {
  allQuestions = allQuestions.filter(d => inferMcqType(d) === "MCQ (Multiple)");
}

  // De-dupe by ID or by normalized text, then shuffle and cap
  allQuestions = uniqueByIdOrText(allQuestions);
  shuffleArray(allQuestions);
  return allQuestions.slice(0, count);
}

const runAndFilter = async (qq, chapterList, difficulty /* new */) => {

const dedupAppend = (arr, docs) => {
  for (const d of docs) {
    if (d.id && usedIds.has(d.id)) continue; // id-only here
    if (d.id) usedIds.add(d.id);
    arr.push(d);

  // Try each marks value as number AND string to handle mixed Firestore schemas.

  for (const mv of variants) {
    // (1) exact difficulty first
    if (forceDifficulty) {
      const q1   = applyFilters(base, { marks: mv });
      const docs1 = await runAndFilter(q1, chapters, forceDifficulty);
      dedupAppend(picked, docs1);
      if (picked.length >= count) return picked.slice(0, count);
    }
    // (2) relax difficulty
    const q2   = applyFilters(base, { marks: mv });
    const docs2 = await runAndFilter(q2, chapters, null);
    dedupAppend(picked, docs2);
    if (picked.length >= count) return picked.slice(0, count);

    // Small util to split an array into chunks of given size
function chunk(arr, size) {
  const out = [];
  for (let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));

}
// Build a sensible marks fallback order, preferring the requested value first.
function buildMarksFallbackOrder(wanted) {
  const w = parseInt(wanted || 0);
  const universe = [1,2,3,4,5,6,8,10]; // adjust to your data if needed
  if (!w || !universe.includes(w)) return universe;
  // put wanted first, then the rest by nearest distance
  const rest = universe.filter(m => m !== w).sort((a,b) => Math.abs(a-w) - Math.abs(b-w));
  return [w, ...rest];
}

function splitEvenAcrossChapters(total, chapters) {

  const rem  = total - base * n;
  const out = Array(n).fill(base);
  for (let i = 0; i < rem; i++) out[i] += 1; // distribute leftovers from start
  return out;
}

  }
  // Borrow across chapters to fill the remainder before erroring
  let remaining = totalNeed - items.length;
  if (remaining > 0) {
    const borrowedSame = await borrow(remaining, forceDiff);
    items.push(...borrowedSame);
    remaining = totalNeed - items.length;
  }
  if (remaining > 0) {
    const borrowedAny = await borrow(remaining, null);
    items.push(...borrowedAny);
  }
  if (items.length < totalNeed) {
    errors.push(`${subject}: Could not pick one per selected chapter; only ${items.length} of ${totalNeed} found.`);
  }
  return;
}

  // Otherwise (we need more questions than chapters), do the even split + borrow fallback.
  const perChapter = splitEvenAcrossChapters(totalNeed, chs);
  for (let i = 0; i < chs.length; i++) {
    const need = perChapter[i];
    if (!need) continue;
    const pool = await fetchFor([chs[i]], need, forceDiff);
    const picked = takeUniqueFromPool(pool, need, usedIds, usedKeys, subjectSeenKeys, marksPerQuestion);
    items.push(...picked);
    perChapter[i] -= picked.length;
  }

  // Borrow to fill any remaining, first same difficulty, then any.
  let remaining = perChapter.reduce((a, b) => a + b, 0);
  if (remaining > 0) {
    const borrowedSame = await borrow(remaining, forceDiff);
    items.push(...borrowedSame);
    remaining = totalNeed - items.length;
  }
  if (remaining > 0) {
    const borrowedAny = await borrow(remaining, null);
    items.push(...borrowedAny);
  }

  if (items.length < totalNeed) {
    errors.push(`${subject}: Only ${items.length} of ${totalNeed} questions found (after chapter balance).`);
  }
}

    // Mixed difficulty: first ensure per-chapter coverage when possible, then fall back.
async function fillMixed(totalNeed) {
  // totalNeed here is number of QUESTIONS for THIS section
  // We enforce 40/30/30 by MARKS across the WHOLE paper via globalMixBudget.
  const diffs = ["Level 1", "Level 2", "Level 3"];
  const mPerQ = Number(marksPerQuestion || 0);
  const sectionMarks = (Number(totalNeed || 0) * mPerQ);

  // Desired marks for this SECTION (local target) using 40/30/30
  const desiredByMarks = splitCounts(sectionMarks, [40, 30, 30]); // [L1, L2, L3] in MARKS

  // Helper to consume from global budget strictly (no relax).
  function takeFromBudget(level, wantedMarks) {
    if (!globalMixBudget) return wantedMarks; // if no budget set, behave as pre-budget (but still strict by level)
    const key = (level === "Level 1") ? "L1" : (level === "Level 2") ? "L2" : "L3";
    const canGive = Math.max(0, Math.min(globalMixBudget[key] || 0, wantedMarks));
    // convert to integer multiple of marks-per-question
    const qCount = Math.floor(canGive / Math.max(1, mPerQ));
    const givenMarks = qCount * mPerQ;
    globalMixBudget[key] = (globalMixBudget[key] || 0) - givenMarks;
    return givenMarks;
  }

  // Compute strict marks-per-level we will try to pick for THIS section
  const wantL1m = takeFromBudget("Level 1", desiredByMarks[0]);
  const wantL2m = takeFromBudget("Level 2", desiredByMarks[1]);
  const wantL3m = takeFromBudget("Level 3", desiredByMarks[2]);

  // Convert marks → question counts for this section (strict)
  let wantL1q = Math.floor(wantL1m / Math.max(1, mPerQ));
  let wantL2q = Math.floor(wantL2m / Math.max(1, mPerQ));
  let wantL3q = Math.floor(wantL3m / Math.max(1, mPerQ));

  // Ensure total does not exceed totalNeed
  const capTotal = Math.min(totalNeed, wantL1q + wantL2q + wantL3q);
  const scaleDown = (wantL1q + wantL2q + wantL3q) > 0 ? capTotal / (wantL1q + wantL2q + wantL3q) : 0;
  if (scaleDown > 0 && scaleDown < 1) {
    wantL1q = Math.floor(wantL1q * scaleDown);
    wantL2q = Math.floor(wantL2q * scaleDown);
    wantL3q = Math.floor(wantL3q * scaleDown);
    // distribute remainder by L1→L2→L3
    let rem = capTotal - (wantL1q + wantL2q + wantL3q);
    const order = ["L1","L2","L3"];
    for (const k of order) {
      if (!rem) break;
      if (k === "L1") wantL1q++;
      else if (k === "L2") wantL2q++;
      else wantL3q++;
      rem--;
    }
  }

  // Fetch strictly per level (no difficulty relax, no borrow)
  async function pickStrict(count, level, chapterList) {
    if (count <= 0) return [];
    const pool = await fetchFor(chapterList || null, count, level);
    return takeUniqueFromPool(pool, count, usedIds, usedKeys, subjectSeenKeys, marksPerQuestion);
  }

  if (!chs.length) {
    const p1 = await pickStrict(wantL1q, "Level 1", null);
    const p2 = await pickStrict(wantL2q, "Level 2", null);
    const p3 = await pickStrict(wantL3q, "Level 3", null);
    items.push(...p1, ...p2, ...p3);

    if (p1.length < wantL1q) errors.push(`${subject}: Mixed(strict, marks) needs ${wantL1q} L1, got ${p1.length}.`);
    if (p2.length < wantL2q) errors.push(`${subject}: Mixed(strict, marks) needs ${wantL2q} L2, got ${p2.length}.`);
    if (p3.length < wantL3q) errors.push(`${subject}: Mixed(strict, marks) needs ${wantL3q} L3, got ${p3.length}.`);
    return;
  }

  // With chapters: split each level’s question count evenly across chapters (strict, no cross-borrow)
  function splitEven(count) { return splitEvenAcrossChapters(count, chs); }

  const L1PerCh = splitEven(wantL1q);
  const L2PerCh = splitEven(wantL2q);
  const L3PerCh = splitEven(wantL3q);

  for (let i = 0; i < chs.length; i++) {
    const ch = chs[i];
    const c1 = await pickStrict(L1PerCh[i], "Level 1", [ch]);
    const c2 = await pickStrict(L2PerCh[i], "Level 2", [ch]);
    const c3 = await pickStrict(L3PerCh[i], "Level 3", [ch]);
    items.push(...c1, ...c2, ...c3);

    if (c1.length < L1PerCh[i]) errors.push(`${subject} / ${ch}: Mixed(strict, marks) needs ${L1PerCh[i]} L1, got ${c1.length}.`);
    if (c2.length < L2PerCh[i]) errors.push(`${subject} / ${ch}: Mixed(strict, marks) needs ${L2PerCh[i]} L2, got ${c2.length}.`);
    if (c3.length < L3PerCh[i]) errors.push(`${subject} / ${ch}: Mixed(strict, marks) needs ${L3PerCh[i]} L3, got ${c3.length}.`);
  }
}

  if (difficultyValue === "Mixed") {
    await fillMixed(requestedCount);
  } else if (difficultyValue && difficultyValue !== "Mixed") {
    await fillNonMixed(requestedCount, difficultyValue);
  } else {
    await fillNonMixed(requestedCount, null);
  }

  return { items: items.slice(0, requestedCount), errors };
}

function createDropdown(containerId, options, placeholder) {
    const container = document.getElementById(containerId);
    if (!container) return;
    const optionsHTML = options.map(opt => `<div data-value="${opt}">${opt}</div>`).join('');
    container.innerHTML = `<div class="selected-option">${placeholder}</div><div class="dropdown-options">${optionsHTML}</div>`;
    container.dataset.value = '';
    container.addEventListener('click', (e) => {
        e.stopPropagation();
        document.querySelectorAll('.custom-dropdown.open').forEach(d => { if (d !== container) d.classList.remove('open'); });
        container.classList.toggle('open');
        if (e.target.dataset.value) {
            const selectedValue = e.target.dataset.value;
            container.querySelector('.selected-option').textContent = selectedValue;
            container.dataset.value = selectedValue;
            container.classList.remove('open');
            container.dispatchEvent(new Event('change', { bubbles: true }));
        }
    });
}
function createMultiSelectDropdown(containerId, options, placeholder, onChange) {
    const container = document.getElementById(containerId);
    if (!container) return;
    const optionsHTML = options.map(opt => `<div><label><input type="checkbox" value="${opt}"> ${opt}</label></div>`).join('');
    container.innerHTML = `<div class="selected-chapters-display placeholder">${placeholder}</div><div class="dropdown-options">${optionsHTML}</div>`;
    container.classList.remove('open');

    // Helper to update display
    function updateDisplay() {
        const checked = Array.from(container.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
        const display = container.querySelector('.selected-chapters-display');
        if (checked.length) {
            display.textContent = checked.join(', ');
            display.classList.remove('placeholder');
        } else {
            display.textContent = placeholder;
            display.classList.add('placeholder');
        }
    }

    container.addEventListener('click', function (e) {
        e.stopPropagation();
        if (e.target.closest('.selected-chapters-display')) container.classList.toggle('open');
        if (e.target.type === 'checkbox') {

            if (onChange) onChange();

  if (sec.type === "all") {

    return n ? `Answer all ${n} questions` : `Answer all the questions`;
  }
  if (sec.type === "any") {
    const anyN = Number(sec.attemptAny) || 0;
    return anyN ? `Answer any ${anyN} questions` : `Answer any questions`;
  }
  if (sec.type === "internal") {
  const p = Number(sec.numPairs) || 0;
  const n = p || 0;
  const plural = n === 1 ? "question" : "questions";
  // Example: "Answer all 2 questions. Choose either (A) or (B) in each."
  return n
    ? `Answer all ${n} ${plural}. Choose either (A) or (B) in each.`
    : `Answer all questions. Choose either (A) or (B) in each.`;
}
  return "";
}

const sectionSeen = new Set();
for (const item of mapped) {

// tolerate any mismatch; just iterate over available slots

const _act = (typeof _mixedActual  !== 'undefined' && _mixedActual)  ? _mixedActual  : { L1:0, L2:0, L3:0 };

       .replace(/[\u2018\u2019\u201A\u2032]/g, "'")
       .replace(/[\u201C\u201D\u2033]/g, '"')
       .replace(/\u00A0/g, ' ')
       .replace(/\s+/g, ' ')
       .trim()
       .toLowerCase()
       .replace(/[.,;:!?]+$/g, '');
  return t ? (t + '||m=' + (marks ?? '')) : '';
