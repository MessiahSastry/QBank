function extractMCQOptions(q) {
  if (Array.isArray(q?.options) && q.options.length === 4) return q.options;

  let s = String(q?.question || q?.text || q?.body || '');
  s = s.replace(/\r/g, '');

  const labelRe = /(^|\s)([ABCD])[\)\.]\s/gi;
  const hits = [];
  let m;
  while ((m = labelRe.exec(s)) !== null) {
    hits.push({ letter: m[2].toUpperCase(), i: m.index + m[0].length });
  }

  const need = ['A', 'B', 'C', 'D'];
  const map = {};
  for (const h of hits) {
    if (!(h.letter in map)) map[h.letter] = h.i;
  }
  if (!need.every(L => map[L] != null)) return null;

  const endA = map['B'];
  const endB = map['C'];
  const endC = map['D'];
  const ansIdx = (s.match(/\bAns?\s*:/i)?.index) ?? s.length;
  const endD = ansIdx;

  const A = s.slice(map['A'], endA).trim();
  const B = s.slice(map['B'], endB).trim();
  const C = s.slice(map['C'], endC).trim();
  const D = s.slice(map['D'], endD).trim();

  return [A, B, C, D];
}
function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}
function shuffleMCQQuestion(questionObj) {
    if (!questionObj.options || !questionObj.options.length) return questionObj;
    let { options, answer } = questionObj;
    let correctIndices = [];
    if (typeof answer === 'string') {
      const ansMatches = String(answer).toUpperCase().match(/[A-D]/g);
      if (ansMatches) correctIndices = ansMatches.map(l => "ABCD".indexOf(l));
    } else if (Array.isArray(answer)) {
      if (answer.length && typeof answer[0] === 'string') {
        correctIndices = answer
          .map(l => "ABCD".indexOf(String(l).toUpperCase()))
          .filter(i => i >= 0);
      } else {
        correctIndices = answer;
      }
    }
    const optPairs = options.map((opt, idx) => ({ opt, idx }));
    shuffleArray(optPairs);
    const newOptions = optPairs.map(p => p.opt);
    const newCorrectIndices = optPairs.map((p, newIdx) => (correctIndices.includes(p.idx) ? newIdx : null)).filter(x => x !== null);
    const ansStr = "Ans: " + newCorrectIndices.map(i => "ABCD"[i] + ")").join(", ");
    return { ...questionObj, options: newOptions, answer: ansStr };
}
function splitCounts(total, percents) {
    let result = percents.map(p => Math.floor(total * p / 100));
    let sum = result.reduce((a, b) => a + b, 0);
    let diff = total - sum;
    for (let i = 0; diff > 0; i++, diff--) result[i % result.length]++;
    return result;
}

function htmlToPlainText(html) {
  if (!html) return '';
  let s = String(html);
  s = s.replace(/<\/p\s*>/gi, '\n')
       .replace(/<br\s*\/?>/gi, '\n')
       .replace(/<\/li\s*>/gi, '\n')
       .replace(/<\/h[1-6]\s*>/gi, '\n');
  s = s.replace(/<[^>]+>/g, ' ');
  s = s.replace(/&nbsp;/gi, ' ')
       .replace(/&amp;/gi, '&')
       .replace(/&lt;/gi, '<')
       .replace(/&gt;/gi, '>')
       .replace(/&#39;/gi, "'")
       .replace(/&quot;/gi, '"');
  s = s.replace(/\r/g, '')
     .replace(/\u00A0/g, ' ')
     .replace(/[ \t]+\n/g, '\n')
     .replace(/[ \t]{2,}/g, ' ')
     .replace(/\n{2,}/g, '\n\n')
     .trim();
  s = s.replace(/\n/g, '\n');
  return s;
}

function parsePastedQuestionsToPool(raw) {
  if (!raw) return [];
  let text = String(raw);

  if (/<[a-z][\s\S]*>/i.test(text)) {
    text = htmlToPlainText(text);
  } else {
    text = text.replace(/\r/g, '').trim();
  }
  if (!text) return [];

  const lines = text.split('\n');
  const merged = [];
  for (let i = 0; i < lines.length; i++) {
    const cur = lines[i].trim();
    if (/^(?:Q\.?\s*)?\d+\s*[\.\)]?$/.test(cur) && i + 1 < lines.length) {
      lines[i + 1] = `${cur} ${lines[i + 1]}`;
      continue;
    }
    merged.push(lines[i]);
  }
  const norm = merged.join('\n');

  const headerRe = /^[ \t]*(?:Q\.?\s*)?(\d+)(?:[\.\)]|\s)\s*/gmi;
  const starts = [];
  let m;
  while ((m = headerRe.exec(norm)) !== null) {
    starts.push(m.index);
  }
  if (!starts.length) {
    const byLines = norm.split(/\n{2,}/).map(s => s.trim()).filter(Boolean);
    return byLines.length ? byLines : [norm.trim()];
  }

  const blocks = [];
  for (let i = 0; i < starts.length; i++) {
    const start = starts[i];
    const end = i + 1 < starts.length ? starts[i + 1] : norm.length;
    const slice = norm.slice(start, end);
    const cleaned = slice.replace(/^[ \t]*(?:Q\.?\s*)?\d+(?:[\.\)]|\s)\s*/, '').trim();
    if (cleaned) blocks.push(cleaned);
  }
  return blocks;
}

function allocateSequentiallyAcrossSections(subjectsData, pool, { shuffleQuestions = true, shuffleOptions = true } = {}) {
  const errors = [];
  let index = 0;
  const stripLead = s => String(s || '').replace(/^\s*(?:Q?\s*\d+[\.\)]\s*)/, '').trim();

  for (const subj of subjectsData) {
    for (const sec of subj.sections) {
      if (sec.type === 'internal') {
        const needPairs = Number(sec.numPairs || 0);
        const marks = Number(sec.marksPerQuestion || 0);
        const pairs = [];

        const takeCleanStem = () => {
          if (index >= pool.length) return null;
          const rawBlock = stripLead(pool[index++]) || '';
          let stem = rawBlock.replace(/\bAns?\s*:\s*.*$/i, '').trim();

          const extracted = extractMCQOptions({ question: rawBlock });
          if (Array.isArray(extracted) && extracted.length === 4) {
            const aLabelIdx = stem.search(/(^|\s)A[)\.]\s/i);
            if (aLabelIdx !== -1) stem = stem.slice(0, aLabelIdx).trim();
          }

          stem = stem.replace(/^\s*(?:\(?[Aa]\)?[.)]|(?:\(A\))|A[.)])\s+/, '');
          stem = stem.replace(/^\s*[aA][.)]\s+/, '');
          return stem || null;
        };

        for (let p = 0; p < needPairs; p++) {
          const aStem = takeCleanStem();
          const bStem = takeCleanStem();
          if (!aStem || !bStem) break;

          const htmlPair =
            `(A) ${aStem}<br>` +
            `<div style="text-align:center;"><b>(OR)</b></div>` +
            `(B) ${bStem}`;

          pairs.push({
            number: p + 1,
            text: htmlPair,
            marks: marks,
            options: [],
            answer: ""
          });
        }

        if (pairs.length < needPairs) {
          errors.push(`${subj.subject} - ${sec.label}: Only ${pairs.length} of ${needPairs} pairs available from source.`);
        }

        sec.questions = pairs;
        continue;
      }

      const need = Number(sec.numQuestions || 0);
      const marks = Number(sec.marksPerQuestion || 0);
      const pick = [];

      for (let i = 0; i < need; i++) {
        if (index >= pool.length) break;

        const rawBlock = stripLead(pool[index++]) || '';
        let stemNoAns = rawBlock.replace(/\bAns?\s*:\s*.*$/i, '').trim();
        const extracted = extractMCQOptions({ question: rawBlock });

        if (Array.isArray(extracted) && extracted.length === 4) {
          const aLabelIdx = stemNoAns.search(/(^|\s)A[)\.]\s/i);
          if (aLabelIdx !== -1) {
            stemNoAns = stemNoAns.slice(0, aLabelIdx).trim();
          }
        }

        if (Array.isArray(extracted) && extracted.length === 4) {
          const cleanOpts = extracted.map(o => String(o)
            .replace(/^[A-D][)\.]\s*/i, '')
            .replace(/\s+[A-D][)\.]?\s*$/i, '')
            .replace(/\s{2,}/g, ' ')
            .trim()
          );

          const ansMatch = String(rawBlock).toUpperCase().match(/\bANS?\s*:\s*([A-D](?:\s*,\s*[A-D])*)/);
          const ansLetters = ansMatch ? ansMatch[1].match(/[A-D]/g) : [];

          let outOptions = cleanOpts.slice();
          let outAnswerLetters = (ansLetters && ansLetters.length) ? ansLetters.slice() : [];

          if (shuffleOptions) {
            const shuffled = shuffleMCQQuestion({
              question: stemNoAns,
              options: cleanOpts,
              answer: outAnswerLetters
            });
            outOptions = shuffled.options || cleanOpts;
            outAnswerLetters = (String(shuffled.answer || '').toUpperCase().match(/[A-D]/g) || []);
          }

          const letterAns = (outAnswerLetters || []).join(',');

          pick.push({
            number: i + 1,
            text: stemNoAns,
            marks: marks,
            options: outOptions,
            answer: letterAns
          });
        } else {
          pick.push({
            number: i + 1,
            text: stemNoAns,
            marks: marks,
            options: [],
            answer: ""
          });
        }
      }

      if (pick.length < need) {
        errors.push(`${subj.subject} - ${sec.label}: Only ${pick.length} of ${need} questions available from source.`);
      }

      if (shuffleQuestions && pick.length > 1) {
        shuffleArray(pick);
      }

      sec.questions = pick;
    }
  }
  return { errors };
}

function normalizeText(s) {
  if (!s) return '';
  let t = String(s);
  t = t.replace(/<[^>]+>/g, ' ');
  t = t.replace(/&nbsp;/gi, ' ').replace(/\u00A0/g, ' ');
  try { t = t.normalize('NFKC'); } catch (e) {}
  t = t.replace(/[\u200B-\u200D\uFEFF]/g, '');
  t = t.replace(/[\u2010-\u2015\u2212]/g, '-');
  t = t.replace(/[\u2018\u2019\u201A\u2032]/g, "'")
       .replace(/[\u201C\u201D\u2033]/g, '"');
  t = t.replace(/\u00D7/g, 'x');
  t = t.replace(/\s+/g, ' ').trim().toLowerCase();
  t = t.replace(/[.,;:!?]+$/g, '');
  return t;
}

function makeStemKey(q) {
  let raw = String(q?.question || q?.text || '');
  raw = raw.replace(/<[^>]+>/g, ' ');
  raw = raw.replace(/^Q\d+:\s*[^A-Za-z0-9]*[\[\]A-Za-z0-9, ]*\s*/i, '');
  raw = raw.replace(/\bAns?\s*:\s*.*$/i, '');
  raw = raw.replace(/\s*(?:\(?\s*A\s*[\)\.])[\s\S]*$/i, '');
  const stemNorm = normalizeText(raw);
  const marks = (q && q.marks != null) ? String(q.marks) : '';
  return stemNorm + '|m=' + String(marks ?? '');
}

function normalizeChoice(s) {
  if (!s) return '';
  let t = String(s);
  t = t.replace(/^[A-D][\)\.]\s*/i, '');
  t = t.replace(/<[^>]+>/g, ' ').replace(/&nbsp;/gi, ' ').replace(/\u00A0/g, ' ');
  try { t = t.normalize('NFKC'); } catch (e) {}
  t = t.replace(/[\u200B-\u200D\uFEFF]/g, '');
  t = t.replace(/[\u2010-\u2015\u2212]/g, '-');
  t = t.replace(/[\u2018\u2019\u201A\u2032]/g, "'").replace(/[\u201C\u201D\u2033]/g, '"');
  t = t.replace(/\u00D7/g, 'x');
  t = t.replace(/\s+/g, ' ').trim().toLowerCase();
  t = t.replace(/[.,;:!?]+$/g, '');
  return t;
}
function extractAnswerLetters(ans) {
  if (!ans) return [];
  if (Array.isArray(ans)) {
    return ans.map(x => String(x)).map(s => s.toUpperCase()).filter(s => /^[ABCD]$/.test(s));
  }
  const m = String(ans).toUpperCase().match(/[A-D]/g);
  return m ? m : [];
}
function normalizeMcqType(s) {
  const t = String(s || '').trim().toLowerCase();
  if (!t) return 'Descriptive';
  if (t.includes('multiple')) return 'MCQ (Multiple)';
  if (t.includes('single')) return 'MCQ (Single)';
  if (t.includes('desc')) return 'Descriptive';
  return s;
}
function inferMcqType(d) {
  const norm = normalizeMcqType(d?.mcqType || d?.type || '');
  if (norm === 'MCQ (Single)' || norm === 'MCQ (Multiple)' || norm === 'Descriptive') return norm;

  const letters = String(
    d?.parsedAnswer ||
    d?.answer ||
    d?.parsedAns ||
    d?.correctAnswer ||
    d?.correct_option ||
    d?.correctOption ||
    ''
  ).toUpperCase().match(/[A-D]/g) || [];

  if (letters.length > 1) return 'MCQ (Multiple)';
  if (Array.isArray(d?.options) && d.options.length === 4) return 'MCQ (Single)';
  return 'Descriptive';
}
function makeDeDupeKey(q) {
  let raw = String(q?.question || q?.text || '');
  raw = raw.replace(/<[^>]+>/g, ' ');
  raw = raw.replace(/^Q\d+:\s*[^A-Za-z0-9]*[\[\]A-Za-z0-9, ]*\s*/i, '');
  raw = raw.replace(/\bAns?\s*:\s*.*$/i, '');
  raw = raw.replace(/\s*(?:\(?\s*A\s*[\)\.])[\s\S]*$/i, '');
  const stemNorm = normalizeText(raw);

  const typeNorm = normalizeMcqType(q?.mcqType || q?.type || '');
  const rawOpts = Array.isArray(q?.options) ? q.options.slice(0, 4) : (extractMCQOptions(q) || []);
  const optNormsInOrder = rawOpts.map(o => normalizeChoice(o)).filter(Boolean);

  const answerValue =
    q?.parsedAnswer ||
    q?.answer ||
    q?.parsedAns ||
    q?.correctAnswer ||
    q?.correct_option ||
    q?.correctOption ||
    '';

  const ansLetters = extractAnswerLetters(answerValue);
  const ansTexts = ansLetters.length && optNormsInOrder.length === 4
    ? ansLetters.map(L => {
        const idx = "ABCD".indexOf(L);
        return idx >= 0 ? optNormsInOrder[idx] : '';
      }).filter(Boolean).sort()
    : [];

  const optionSet = Array.from(new Set(optNormsInOrder)).sort();

  const key =
    stemNorm +
    '||t=' + (typeNorm || '') +
    '||opts=' + optionSet.join('|') +
    '||ans=' + ansTexts.join('|');

  return key;
}
function uniqueByIdOrText(arr) {
  const seenIds = new Set();
  const seenStem = new Set();
  const out = [];
  for (const q of (arr || [])) {
    const id = q && q.id;
    const key = makeStemKey(q);
    if ((id && seenIds.has(id)) || (key && seenStem.has(key))) continue;
    if (id) seenIds.add(id);
    if (key) seenStem.add(key);
    out.push(q);
  }
  return out;
}
function chunk(arr, size) {
  const out = [];
  for (let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
  return out;
}
function buildMarksFallbackOrder(wanted) {
  const w = parseInt(wanted || 0);
  const universe = [1,2,3,4,5,6,8,10];
  if (!w || !universe.includes(w)) return universe;
  const rest = universe.filter(m => m !== w).sort((a,b) => Math.abs(a-w) - Math.abs(b-w));
  return [w, ...rest];
}
function splitEvenAcrossChapters(total, chapters) {
  const n = Math.max(1, (chapters || []).length);
  const base = Math.floor(total / n);
  const rem = total - base * n;
  const out = Array(n).fill(base);
  for (let i = 0; i < rem; i++) out[i] += 1;
  return out;
}
function takeUniqueFromPool(pool, need, usedIds, usedKeys, subjectSeenKeys, secMarks) {
  const out = [];
  const mPerQ = Number(secMarks ?? 0);
  for (const d of (pool || [])) {
    const id = d && d.id;
    const key = makeStemKey({ text: d.question || d.text || '', marks: mPerQ });
    if ((id && usedIds.has(id)) || (key && usedKeys.has(key)) || (key && subjectSeenKeys.has(key))) continue;
    if (id) usedIds.add(id);
    if (key) usedKeys.add(key);
    out.push(d);
    if (out.length >= need) break;
  }
  return out;
}

const db = {
    getChapters: async (selectedClass, selectedBoard, selectedSubject) => {
        if (!currentUser || !selectedClass || !selectedBoard || !selectedSubject) return [];
        try {
            const snapshot = await firestore.collection("questions")
                .where("createdBy", "==", currentUser.uid)
                .where("class", "==", selectedClass)
                .where("board", "==", selectedBoard)
                .where("subject", "==", selectedSubject)
                .get();

            if (snapshot.empty) return [];

            const chapterSet = new Set();
            snapshot.forEach(doc => {
                const data = doc.data() || {};
                if (data.chapter) chapterSet.add(String(data.chapter).trim());
            });

            return Array.from(chapterSet).filter(Boolean).sort((a, b) => a.localeCompare(b));
        } catch (error) {
            console.error("Error fetching chapters from Firestore:", error);
            return [];
        }
    }
};

async function fetchQuestions({
  selectedClass,
  selectedBoard,
  selectedSubject,
  chapters,
  marksPerQuestion,
  mcqType,
  count,
  forceDifficulty
}) {
  let query = firestore.collection("questions")
    .where("createdBy", "==", currentUser.uid)
    .where("class", "==", selectedClass)
    .where("board", "==", selectedBoard)
    .where("subject", "==", selectedSubject);

  if (chapters && chapters.length === 1) {
    query = query.where("chapter", "==", chapters[0]);
  }

  const snapshot = await query.get();
  let allQuestions = [];

  snapshot.forEach(doc => {
  allQuestions.push({ id: doc.id, ...doc.data() });
});

allQuestions.sort((a, b) => {
  const qa = Number(a.questionNumber || 0);
  const qb = Number(b.questionNumber || 0);
  return qa - qb;
});

  if (chapters && chapters.length > 1) {
    allQuestions = allQuestions.filter(d => chapters.includes(String(d.chapter || '').trim()));
  }

  if (marksPerQuestion) {
    const wantedMarks = Number(marksPerQuestion);
    allQuestions = allQuestions.filter(d => Number(d.marks) === wantedMarks);
  }

  if (forceDifficulty) {
    allQuestions = allQuestions.filter(d => String(d.difficulty || d.level || '').trim() === forceDifficulty);
  } else {
    const globalDifficulty = getSelectedDifficulty();
    if (globalDifficulty && globalDifficulty !== "Mixed") {
      allQuestions = allQuestions.filter(d => String(d.difficulty || d.level || '').trim() === globalDifficulty);
    }
  }

  if (mcqType === "Descriptive") {
    allQuestions = allQuestions.filter(d => inferMcqType(d) === "Descriptive");
  } else if (mcqType === "MCQ (Single)") {
    allQuestions = allQuestions.filter(d => inferMcqType(d) === "MCQ (Single)");
  } else if (mcqType === "MCQ (Multiple)") {
    allQuestions = allQuestions.filter(d => inferMcqType(d) === "MCQ (Multiple)");
  }

  allQuestions = uniqueByIdOrText(allQuestions);
  shuffleArray(allQuestions);
  return allQuestions.slice(0, count);
}

async function fetchQuestionsWithMarksFallback({
  selectedClass,
  selectedBoard,
  selectedSubject,
  chapters,
  marksPerQuestion,
  mcqType,
  count,
  forceDifficulty
}) {
  const wantedMarks = parseInt(marksPerQuestion);
  const marksOrder = buildMarksFallbackOrder(wantedMarks);

  const picked = [];
  const usedIds = new Set();

  const baseQuery = firestore.collection("questions")
    .where("createdBy", "==", currentUser.uid)
    .where("class", "==", selectedClass)
    .where("board", "==", selectedBoard)
    .where("subject", "==", selectedSubject);

  const isAllowedType = (d) => {
    const typ = inferMcqType(d);
    if (mcqType === "MCQ (Single)") return typ === "MCQ (Single)";
    if (mcqType === "MCQ (Multiple)") return typ === "MCQ (Multiple)";
    if (mcqType === "Descriptive") return typ === "Descriptive";
    return true;
  };

  const normDiff = s => {
    let t = String(s || "")
      .replace(/<[^>]+>/g, " ")
      .replace(/\u00A0/g, " ")
      .replace(/\s+/g, "")
      .trim()
      .toLowerCase();
    t = t.replace(/^level[-_]?(\d)$/, 'level$1');
    t = t.replace(/^l(\d)$/, 'level$1');
    return t;
  };

  const applyChapterFilter = async (queryObj, chapterList) => {
    const rows = [];
    if (chapterList && chapterList.length === 1) {
      const snap = await queryObj.where("chapter", "==", chapterList[0]).get();
snap.forEach(doc => rows.push({ id: doc.id, ...doc.data() }));
rows.sort((a, b) => Number(a.questionNumber || 0) - Number(b.questionNumber || 0));
return rows;
    }

    const snap = await queryObj.get();
snap.forEach(doc => rows.push({ id: doc.id, ...doc.data() }));
rows.sort((a, b) => Number(a.questionNumber || 0) - Number(b.questionNumber || 0));

    if (chapterList && chapterList.length > 1) {
      return rows.filter(d => chapterList.includes(String(d.chapter || '').trim()));
    }
    return rows;
  };

  const runAndFilter = async (marks, difficulty, chapterList) => {
    let q = baseQuery.where("marks", "==", marks);
    let collected = await applyChapterFilter(q, chapterList);
    collected = collected.filter(isAllowedType);

    if (difficulty) {
      const want = normDiff(difficulty);
      collected = collected.filter(d => normDiff(d.difficulty || d.level) === want);
    }

    return uniqueByIdOrText(collected);
  };

  for (const marks of marksOrder) {
    const variants = Number.isFinite(marks) ? [marks, String(marks)] : [marks];

    for (const mv of variants) {
      if (forceDifficulty) {
        const docs1 = await runAndFilter(mv, forceDifficulty, chapters);
        for (const d of docs1) {
          if (d.id && usedIds.has(d.id)) continue;
          if (d.id) usedIds.add(d.id);
          picked.push(d);
          if (picked.length >= count) return picked.slice(0, count);
        }
      }

      const docs2 = await runAndFilter(mv, null, chapters);
      for (const d of docs2) {
        if (d.id && usedIds.has(d.id)) continue;
        if (d.id) usedIds.add(d.id);
        picked.push(d);
        if (picked.length >= count) return picked.slice(0, count);
      }
    }
  }

  return picked.slice(0, count);
}

async function fetchBalancedAcrossChapters({
  selectedClass,
  selectedBoard,
  subject,
  chapters,
  marksPerQuestion,
  mcqType,
  requestedCount,
  difficultyValue,
  subjectSeenKeys,
  globalMixBudget
}) {
  const errors = [];
  const items = [];
  const usedIds = new Set();
  const usedKeys = new Set();

  const chs = Array.isArray(chapters) ? chapters.slice() : [];

  async function fetchFor(chapterList, count, forceDifficulty) {
    if (!count) return [];
    let docs = await fetchQuestionsWithMarksFallback({
      selectedClass,
      selectedBoard,
      selectedSubject: subject,
      chapters: chapterList && chapterList.length ? chapterList : undefined,
      marksPerQuestion,
      mcqType,
      count: Math.max(count * 2, count + 2),
      forceDifficulty: forceDifficulty || undefined
    });
    return uniqueByIdOrText(docs);
  }

  async function borrow(need, sameDifficulty) {
    if (need <= 0) return [];
    let pool = [];
    if (sameDifficulty) {
      pool = await fetchFor(chs, need, sameDifficulty);
      let picked = takeUniqueFromPool(pool, need, usedIds, usedKeys, subjectSeenKeys, marksPerQuestion);
      need -= picked.length;
      if (need <= 0) return picked;

      const pool2 = await fetchFor(chs, need, null);
      picked = picked.concat(takeUniqueFromPool(pool2, need, usedIds, usedKeys, subjectSeenKeys, marksPerQuestion));
      return picked;
    } else {
      pool = await fetchFor(chs, need, null);
      return takeUniqueFromPool(pool, need, usedIds, usedKeys, subjectSeenKeys, marksPerQuestion);
    }
  }

  async function fillNonMixed(totalNeed, forceDiff) {
    if (!chs.length) {
      const pool = await fetchFor(null, totalNeed, forceDiff);
      items.push(...takeUniqueFromPool(pool, totalNeed, usedIds, usedKeys, subjectSeenKeys, marksPerQuestion));
      return;
    }

    const strictOneEach = totalNeed <= chs.length;
    if (strictOneEach) {
      for (let i = 0; i < chs.length && items.length < totalNeed; i++) {
        let pool = await fetchFor([chs[i]], 1, forceDiff);
        let picked = takeUniqueFromPool(pool, 1, usedIds, usedKeys, subjectSeenKeys, marksPerQuestion);
        if (!picked.length) {
          pool = await fetchFor([chs[i]], 1, null);
          picked = takeUniqueFromPool(pool, 1, usedIds, usedKeys, subjectSeenKeys, marksPerQuestion);
        }
        if (picked.length) items.push(...picked);
      }

      let remaining = totalNeed - items.length;
      if (remaining > 0) {
        const borrowedSame = await borrow(remaining, forceDiff);
        items.push(...borrowedSame);
        remaining = totalNeed - items.length;
      }
      if (remaining > 0) {
        const borrowedAny = await borrow(remaining, null);
        items.push(...borrowedAny);
      }
      if (items.length < totalNeed) {
        errors.push(`${subject}: Could not pick one per selected chapter; only ${items.length} of ${totalNeed} found.`);
      }
      return;
    }

    const perChapter = splitEvenAcrossChapters(totalNeed, chs);
    for (let i = 0; i < chs.length; i++) {
      const need = perChapter[i];
      if (!need) continue;
      const pool = await fetchFor([chs[i]], need, forceDiff);
      const picked = takeUniqueFromPool(pool, need, usedIds, usedKeys, subjectSeenKeys, marksPerQuestion);
      items.push(...picked);
      perChapter[i] -= picked.length;
    }

    let remaining = perChapter.reduce((a, b) => a + b, 0);
    if (remaining > 0) {
      const borrowedSame = await borrow(remaining, forceDiff);
      items.push(...borrowedSame);
      remaining = totalNeed - items.length;
    }
    if (remaining > 0) {
      const borrowedAny = await borrow(remaining, null);
      items.push(...borrowedAny);
    }

    if (items.length < totalNeed) {
      errors.push(`${subject}: Only ${items.length} of ${totalNeed} questions found (after chapter balance).`);
    }
  }

  async function fillMixed(totalNeed) {
    const mPerQ = Number(marksPerQuestion || 0);
    const sectionMarks = (Number(totalNeed || 0) * mPerQ);
    const desiredByMarks = splitCounts(sectionMarks, [40, 30, 30]);

    function takeFromBudget(level, wantedMarks) {
      if (!globalMixBudget) return wantedMarks;
      const key = (level === "Level 1") ? "L1" : (level === "Level 2") ? "L2" : "L3";
      const canGive = Math.max(0, Math.min(globalMixBudget[key] || 0, wantedMarks));
      const qCount = Math.floor(canGive / Math.max(1, mPerQ));
      const givenMarks = qCount * mPerQ;
      globalMixBudget[key] = (globalMixBudget[key] || 0) - givenMarks;
      return givenMarks;
    }

    const wantL1m = takeFromBudget("Level 1", desiredByMarks[0]);
    const wantL2m = takeFromBudget("Level 2", desiredByMarks[1]);
    const wantL3m = takeFromBudget("Level 3", desiredByMarks[2]);

    let wantL1q = Math.floor(wantL1m / Math.max(1, mPerQ));
    let wantL2q = Math.floor(wantL2m / Math.max(1, mPerQ));
    let wantL3q = Math.floor(wantL3m / Math.max(1, mPerQ));

    const capTotal = Math.min(totalNeed, wantL1q + wantL2q + wantL3q);
    const scaleDown = (wantL1q + wantL2q + wantL3q) > 0 ? capTotal / (wantL1q + wantL2q + wantL3q) : 0;
    if (scaleDown > 0 && scaleDown < 1) {
      wantL1q = Math.floor(wantL1q * scaleDown);
      wantL2q = Math.floor(wantL2q * scaleDown);
      wantL3q = Math.floor(wantL3q * scaleDown);
      let rem = capTotal - (wantL1q + wantL2q + wantL3q);
      const order = ["L1", "L2", "L3"];
      for (const k of order) {
        if (!rem) break;
        if (k === "L1") wantL1q++;
        else if (k === "L2") wantL2q++;
        else wantL3q++;
        rem--;
      }
    }

    async function pickStrict(count, level, chapterList) {
      if (count <= 0) return [];
      const pool = await fetchFor(chapterList || null, count, level);
      return takeUniqueFromPool(pool, count, usedIds, usedKeys, subjectSeenKeys, marksPerQuestion);
    }

    if (!chs.length) {
      const p1 = await pickStrict(wantL1q, "Level 1", null);
      const p2 = await pickStrict(wantL2q, "Level 2", null);
      const p3 = await pickStrict(wantL3q, "Level 3", null);
      items.push(...p1, ...p2, ...p3);

      if (p1.length < wantL1q) errors.push(`${subject}: Mixed(strict, marks) needs ${wantL1q} L1, got ${p1.length}.`);
      if (p2.length < wantL2q) errors.push(`${subject}: Mixed(strict, marks) needs ${wantL2q} L2, got ${p2.length}.`);
      if (p3.length < wantL3q) errors.push(`${subject}: Mixed(strict, marks) needs ${wantL3q} L3, got ${p3.length}.`);
      return;
    }

    function splitEven(count) { return splitEvenAcrossChapters(count, chs); }

    const L1PerCh = splitEven(wantL1q);
    const L2PerCh = splitEven(wantL2q);
    const L3PerCh = splitEven(wantL3q);

    for (let i = 0; i < chs.length; i++) {
      const ch = chs[i];
      const c1 = await pickStrict(L1PerCh[i], "Level 1", [ch]);
      const c2 = await pickStrict(L2PerCh[i], "Level 2", [ch]);
      const c3 = await pickStrict(L3PerCh[i], "Level 3", [ch]);
      items.push(...c1, ...c2, ...c3);

      if (c1.length < L1PerCh[i]) errors.push(`${subject} / ${ch}: Mixed(strict, marks) needs ${L1PerCh[i]} L1, got ${c1.length}.`);
      if (c2.length < L2PerCh[i]) errors.push(`${subject} / ${ch}: Mixed(strict, marks) needs ${L2PerCh[i]} L2, got ${c2.length}.`);
      if (c3.length < L3PerCh[i]) errors.push(`${subject} / ${ch}: Mixed(strict, marks) needs ${L3PerCh[i]} L3, got ${c3.length}.`);
    }
  }

  if (difficultyValue === "Mixed") {
    await fillMixed(requestedCount);
  } else if (difficultyValue && difficultyValue !== "Mixed") {
    await fillNonMixed(requestedCount, difficultyValue);
  } else {
    await fillNonMixed(requestedCount, null);
  }

  return { items: items.slice(0, requestedCount), errors };
}

function buildSectionInstructions(sec) {
    if (sec.type === "all") {
        const n = Number(sec.numQuestions) || 0;
        return n ? `Answer all ${n} questions` : `Answer all the questions`;
    }
    if (sec.type === "any") {
        const anyN = Number(sec.attemptAny) || 0;
        return anyN ? `Answer any ${anyN} questions` : `Answer any questions`;
    }
    if (sec.type === "internal") {
        const p = Number(sec.numPairs) || 0;
        const n = p || 0;
        const plural = n === 1 ? "question" : "questions";
        return n
            ? `Answer all ${n} ${plural}. Choose either (A) or (B) in each.`
            : `Answer all questions. Choose either (A) or (B) in each.`;
    }
    return "";
}

function getQuestionTextFromDoc(data) {
    return data.question || data.body || data.text || '';
}

function getQuestionAnswerFromDoc(data) {
    const candidates = [
        data.parsedAnswer,
        data.parsedAns,
        data.correctAnswer,
        data.correct_option,
        data.correctOption,
        data.answer
    ];

    for (const val of candidates) {
        if (val == null) continue;

        const letters = String(val).toUpperCase().match(/[A-D]/g) || [];
        const cleaned = [];
        const seen = new Set();

        for (const ch of letters) {
            if (!seen.has(ch)) {
                seen.add(ch);
                cleaned.push(ch);
            }
        }

        if (cleaned.length) {
            return cleaned.join(',');
        }
    }

    return '';
}

function getQuestionExplanationFromDoc(data) {
    return data.explanation || data.solution || data.explain || '';
}

function normalizeQuestionDoc(doc) {
    const q = { ...(doc || {}) };
    q.question = getQuestionTextFromDoc(q);
    q.answer = getQuestionAnswerFromDoc(q);
    q.explanation = getQuestionExplanationFromDoc(q);
    q.mcqType = normalizeMcqType(q.mcqType || q.type || '');
    q.difficulty = q.difficulty || q.level || '';
    q.options = Array.isArray(q.options) ? q.options : [];
    return q;
}

function mapBankQuestionToBuilderQuestion(q, sectionMcqType, marksPerQuestion) {
    const norm = normalizeQuestionDoc(q);
    const stem = norm.question || '';
    const extractedOptions = extractMCQOptions(norm);
    const options = Array.isArray(norm.options) && norm.options.length === 4
        ? norm.options.slice(0, 4)
        : (Array.isArray(extractedOptions) && extractedOptions.length === 4 ? extractedOptions : []);

    const answerLetters = String(norm.answer || '')
    .toUpperCase()
    .split(',')
    .map(x => x.trim())
    .filter(x => /^[A-D]$/.test(x))
    .join(',');

    if ((sectionMcqType === "MCQ (Single)" || sectionMcqType === "MCQ (Multiple)") && options.length === 4) {
        const clean = options.map(o => String(o).replace(/^[A-D][).]\s*/i, '').trim());

        if (getGlobalShuffleOptions()) {
            const shuffled = shuffleMCQQuestion({
                ...norm,
                question: stem,
                options: clean,
                answer: norm.answer
            });

            const letterAns = (String(shuffled.answer || '').toUpperCase().match(/[A-D]/g) || []).join(',');

            return {
                number: 0,
                text: shuffled.question || stem,
                marks: Number(marksPerQuestion || norm.marks || 0),
                options: shuffled.options || clean,
                answer: letterAns,
                explanation: norm.explanation || '',
                image: norm.image || ''
            };
        }

        return {
            number: 0,
            text: stem,
            marks: Number(marksPerQuestion || norm.marks || 0),
            options: clean,
            answer: answerLetters,
            explanation: norm.explanation || '',
            image: norm.image || ''
        };
    }

    return {
        number: 0,
        text: stem,
        marks: Number(marksPerQuestion || norm.marks || 0),
        options: [],
        answer: '',
        explanation: norm.explanation || '',
        image: norm.image || ''
    };
}

                };

                let allSectionErrors = [];

                if (sourceTypeGlobal === 'Question Bank') {
                    let strictSlots = [];
                    var _mixedTargets = { L1:0, L2:0, L3:0 };
                    var _mixedActual  = { L1:0, L2:0, L3:0 };
                    var _mixedG = 1;

                    if (difficultyValue === "Mixed") {
                        const allSlots = [];

                        subjectsData.forEach((sd, sIdx) => {
                            sd.sections.forEach((sec, secIdx) => {
                                if (sec.type === "all" || sec.type === "any") {
                                    const n = Number(sec.numQuestions || 0);
                                    const m = Number(sec.marksPerQuestion || 0);
                                    for (let i = 0; i < n; i++) {
                                        allSlots.push({
                                            sIdx,
                                            secIdx,
                                            subject: sd.subject,
                                            label: sec.label,
                                            marksPerQuestion: m
                                        });
                                    }
                                }
                            });
                        });

                        const totalMarks = allSlots.reduce((s, sl) => s + (sl.marksPerQuestion || 0), 0);

                        const _gcd = (a,b)=> b===0 ? Math.abs(a) : _gcd(b, a%b);
                        _mixedG = allSlots.reduce((g, sl) => _gcd(g, sl.marksPerQuestion||0), 0) || 1;

                        const wantRaw = splitCounts(totalMarks, [40,30,30]);
                        const rounded = wantRaw.map(v => Math.round(v / _mixedG) * _mixedG);

                        const errs = wantRaw.map((v,i) => v - rounded[i]);
                        let curSum = rounded.reduce((a,b)=>a+b,0);

                        while (curSum !== totalMarks) {
                            let idx = 0, best = -Infinity;
                            for (let i=0;i<3;i++){
                                const dir = (totalMarks > curSum) ? 1 : -1;
                                const score = dir * errs[i];
                                if (score > best) {
                                    best = score;
                                    idx = i;
                                }
                            }
                            rounded[idx] += (totalMarks > curSum) ? _mixedG : -_mixedG;
                            errs[idx] += (totalMarks > curSum) ? _mixedG : -_mixedG;
                            curSum = rounded.reduce((a,b)=>a+b,0);
                        }

                        _mixedTargets = { L1: rounded[0], L2: rounded[1], L3: rounded[2] };

                        allSlots.sort((a,b)=> (b.marksPerQuestion||0) - (a.marksPerQuestion||0));
                        _mixedActual = { L1:0, L2:0, L3:0 };

                        strictSlots = allSlots.map(sl => {
                            const deficits = [
                                { k:"L1", d: (_mixedTargets.L1 - _mixedActual.L1) },
                                { k:"L2", d: (_mixedTargets.L2 - _mixedActual.L2) },
                                { k:"L3", d: (_mixedTargets.L3 - _mixedActual.L3) },
                            ].sort((x,y)=> y.d - x.d);

                            const pick = deficits[0].k;
                            _mixedActual[pick] += sl.marksPerQuestion || 0;
                            return { ...sl, assigned: pick };
                        });
                    }

                    for (let sIdx = 0; sIdx < subjectsData.length; sIdx++) {
                        const subjData = subjectsData[sIdx];
                        const subjectSeenKeys = new Set();

                        const subjectBlock = {
                            subject: subjData.subject,
                            chapters: subjData.chapters,
                            sections: []
                        };

                        for (let secIdx = 0; secIdx < subjData.sections.length; secIdx++) {
                            const sec = subjData.sections[secIdx];
                            let questions = [];
                            let sectionErrors = [];

                            if (sec.type === "all" || sec.type === "any") {
                                const requestedCount = Number(sec.numQuestions || 0);
                                const mPerQ = Number(sec.marksPerQuestion || 0);

                                if (difficultyValue !== "Mixed") {
                                    const { items: rawItems, errors: balanceErrors } = await fetchBalancedAcrossChapters({
                                        selectedClass,
                                        selectedBoard,
                                        subject: subjData.subject,
                                        chapters: subjData.chapters,
                                        marksPerQuestion: sec.marksPerQuestion,
                                        mcqType: sec.mcqType,
                                        requestedCount,
                                        difficultyValue,
                                        subjectSeenKeys,
                                        globalMixBudget: null
                                    });

                                    if (balanceErrors?.length) {
                                        sectionErrors = sectionErrors.concat(balanceErrors);
                                    }

                                    const pool = Array.isArray(rawItems) ? rawItems.slice(0, requestedCount) : [];
                                    const mapped = pool.map(q => mapBankQuestionToBuilderQuestion(q, sec.mcqType, mPerQ));

                                    const filtered = [];
                                    const sectionSeen = new Set();

                                    for (const item of mapped) {
                                        const k = makeStemKey({ text: item.text, marks: mPerQ });
                                        if (k && (subjectSeenKeys.has(k) || sectionSeen.has(k))) continue;
                                        if (k) {
                                            subjectSeenKeys.add(k);
                                            sectionSeen.add(k);
                                        }
                                        filtered.push(item);
                                    }

                                    questions = filtered.map((it, i) => ({ ...it, number: i + 1 }));
                                } else {
                                    const mySlots = strictSlots.filter(sl =>
                                        sl.sIdx === sIdx &&
                                        sl.secIdx === secIdx &&
                                        sl.marksPerQuestion === mPerQ
                                    );

                                    const takeCount = Math.min(requestedCount, mySlots.length);

                                    for (let i = 0; i < takeCount; i++) {
                                        const slot = mySlots[i];
                                        const _tgt = (typeof _mixedTargets !== 'undefined' && _mixedTargets) ? _mixedTargets : { L1:0, L2:0, L3:0 };
                                        const _act = (typeof _mixedActual  !== 'undefined' && _mixedActual)  ? _mixedActual  : { L1:0, L2:0, L3:0 };

                                        const deficits = [
                                            { k:"L1", d: (_tgt.L1 - _act.L1) },
                                            { k:"L2", d: (_tgt.L2 - _act.L2) },
                                            { k:"L3", d: (_tgt.L3 - _act.L3) },
                                        ].sort((a,b)=> b.d - a.d).map(x=>x.k);

                                        const preferred = slot?.assigned || deficits[0];
                                        const levelsTry = [preferred, ...deficits.filter(k => k !== preferred)];

                                        let picked = null, pickedLevel = null;

                                        for (const lv of levelsTry) {
                                            const forceDiff = lv === 'L1' ? "Level 1" : (lv === 'L2' ? "Level 2" : "Level 3");

                                            const docs = await fetchQuestionsWithMarksFallback({
                                                selectedClass,
                                                selectedBoard,
                                                selectedSubject: subjData.subject,
                                                chapters: subjData.chapters,
                                                marksPerQuestion: mPerQ,
                                                mcqType: sec.mcqType,
                                                count: Math.max(40, requestedCount * 2),
                                                forceDifficulty: forceDiff
                                            });

                                            const sectionSeen = new Set(questions.map(q => makeStemKey({ text: q.text, marks: mPerQ })));

                                            for (const d of uniqueByIdOrText(docs)) {
                                                const k = makeStemKey({ text: getQuestionTextFromDoc(d), marks: mPerQ });
                                                if (k && (sectionSeen.has(k) || subjectSeenKeys.has(k))) continue;
                                                picked = d;
                                                pickedLevel = lv;
                                                break;
                                            }

                                            if (picked) break;
                                        }

                                        if (!picked) {
                                            const docs = await fetchQuestionsWithMarksFallback({
                                                selectedClass,
                                                selectedBoard,
                                                selectedSubject: subjData.subject,
                                                chapters: subjData.chapters,
                                                marksPerQuestion: mPerQ,
                                                mcqType: sec.mcqType,
                                                count: Math.max(40, requestedCount * 2),
                                                forceDifficulty: null
                                            });

                                            const sectionSeen = new Set(questions.map(q => makeStemKey({ text: q.text, marks: mPerQ })));

                                            for (const d of uniqueByIdOrText(docs)) {
                                                const k = makeStemKey({ text: getQuestionTextFromDoc(d), marks: mPerQ });
                                                if (k && (sectionSeen.has(k) || subjectSeenKeys.has(k))) continue;
                                                picked = d;
                                                pickedLevel = preferred;
                                                break;
                                            }
                                        }

                                        if (!picked) {
                                            sectionErrors.push(`${subjData.subject} - ${sec.label}: no bank question available for one ${mPerQ}-mark slot.`);
                                            continue;
                                        }

                                        let out = mapBankQuestionToBuilderQuestion(picked, sec.mcqType, mPerQ);
                                        out._assignedLevel = pickedLevel || (slot?.assigned || 'L1');

                                        questions.push({
                                            ...out,
                                            number: questions.length + 1
                                        });

                                        if (_mixedActual && out._assignedLevel) {
                                            _mixedActual[out._assignedLevel] = (_mixedActual[out._assignedLevel] || 0) + mPerQ;
                                        }
                                    }
                                }
                            } else if (sec.type === "internal") {
                                let missingPairs = 0;

                                for (let p = 0; p < (sec.pairs || []).length; p++) {
                                    const pairAChapter = sec.pairs[p].chapterA ? [sec.pairs[p].chapterA] : [];
                                    const pairBChapter = sec.pairs[p].chapterB ? [sec.pairs[p].chapterB] : [];

                                    const qA = await fetchQuestions({
                                        selectedClass,
                                        selectedBoard,
                                        selectedSubject: subjData.subject,
                                        chapters: pairAChapter,
                                        marksPerQuestion: sec.marksPerQuestion,
                                        mcqType: "Descriptive",
                                        count: 1
                                    });

                                    const qB = await fetchQuestions({
                                        selectedClass,
                                        selectedBoard,
                                        selectedSubject: subjData.subject,
                                        chapters: pairBChapter,
                                        marksPerQuestion: sec.marksPerQuestion,
                                        mcqType: "Descriptive",
                                        count: 1
                                    });

                                    if (!qA.length || !qB.length) {
                                        missingPairs++;
                                        continue;
                                    }

                                    const qAText = getQuestionTextFromDoc(qA[0]);
                                    const qBText = getQuestionTextFromDoc(qB[0]);

                                    questions.push({
                                        number: p + 1,
                                        text: `(A) ${qAText}<br><div style="text-align:center;"><b>(OR)</b></div>(B) ${qBText}`,
                                        marks: sec.marksPerQuestion,
                                        options: [],
                                        answer: "",
                                        image: qA[0].image || qB[0].image || null
                                    });
                                }

                                if (missingPairs > 0 || questions.length < sec.numPairs) {
                                    sectionErrors.push(`${subjData.subject} - ${sec.label}: Only ${questions.length} of ${sec.numPairs} pairs found.`);
                                }
                            }

                            const patchedSec = { ...sec };
                            if (sec.type === "all" || sec.type === "any") patchedSec.numQuestions = (questions || []).length;
                            if (sec.type === "internal") patchedSec.numPairs = (questions || []).length;

                            subjectBlock.sections.push({
                                ...patchedSec,
                                questions,
                                instructions: buildSectionInstructions(patchedSec)
                            });

                            if (sectionErrors.length) {
                                allSectionErrors = allSectionErrors.concat(sectionErrors);
                            }
                        }

                        finalPaper.subjects.push(subjectBlock);
                    }
                } else {
                    let rawText = '';
                    const pasteText = (document.getElementById('global-paste-area')?.value || '').trim();
                    const hasPaste = pasteText.length > 0;
                    const hasDocx  = !!window._globalDocxArrayBuffer;
                    let effective  = sourceTypeGlobal;

                    if (effective === 'Upload .docx' && !hasDocx && hasPaste) effective = 'Paste';
                    if (effective === 'Paste' && !hasPaste && hasDocx) effective = 'Upload .docx';

                    if (effective === 'Paste') {
                        rawText = pasteText;
                    } else if (effective === 'Upload .docx') {
                        if (!hasDocx) {
                            allSectionErrors.push('No .docx file selected.');
                        } else {
                            try {
                                const result = await window.mammoth.convertToHtml(
                                    { arrayBuffer: window._globalDocxArrayBuffer },
                                    {
                                        convertImage: mammoth.images.inline(img =>
                                            img.read("base64").then(b64 => ({
                                                src: `data:${img.contentType};base64,${b64}`
                                            }))
                                        )
                                    }
                                );
                                rawText = htmlToPlainText(result?.value || '');
                            } catch {
                                allSectionErrors.push('Failed to read .docx file.');
                            }
                        }
                    }

                    if ((effective === 'Paste' || effective === 'Upload .docx') && !rawText) {
                        allSectionErrors.push('No questions detected in the provided source.');
                    }

                    const pool = parsePastedQuestionsToPool(rawText);

                    const { errors: allocErrors } = allocateSequentiallyAcrossSections(
                        subjectsData,
                        pool,
                        {
                            shuffleQuestions: getGlobalShuffleQuestions(),
                            shuffleOptions:  getGlobalShuffleOptions()
                        }
                    );

                    if (allocErrors?.length) {
                        allSectionErrors = allSectionErrors.concat(allocErrors);
                    }

                    for (const subjData of subjectsData) {
                        const subjectBlock = {
                            subject: subjData.subject,
                            chapters: [],
                            sections: []
                        };

                        for (const sec of subjData.sections) {
                            const patched = { ...sec };
                            if (sec.type === 'all' || sec.type === 'any') patched.numQuestions = (sec.questions || []).length;
                            if (sec.type === 'internal') patched.numPairs = (sec.questions || []).length;

                            subjectBlock.sections.push({
                                ...patched,
                                questions: sec.questions || [],
                                instructions: buildSectionInstructions(patched)
                            });
                        }

                        finalPaper.subjects.push(subjectBlock);
                    }
                }

                if (allSectionErrors.length > 0) {
                    showModalPrompt(`<b>Please review:</b><br><ul style="text-align:left">${allSectionErrors.map(e => `<li>${e}</li>`).join('')}</ul>`);
                    btn.disabled = false;
                    btn.textContent = "Build Exam Draft";
                    return;
                }

                if (sourceTypeGlobal === 'Question Bank' && difficultyValue === "Mixed") {
                    const actual = { L1: 0, L2: 0, L3: 0 };

                    for (const subj of finalPaper.subjects || []) {
                        for (const sec of subj.sections || []) {
                            if (sec.type === "all" || sec.type === "any") {
                                for (const q of (sec.questions || [])) {
                                    if (q._assignedLevel === 'L1') actual.L1 += (q.marks || 0);
                                    if (q._assignedLevel === 'L2') actual.L2 += (q.marks || 0);
                                    if (q._assignedLevel === 'L3') actual.L3 += (q.marks || 0);
                                }
                            }
                        }
                    }

                    const g = (typeof _mixedG !== 'undefined' && _mixedG) ? _mixedG : 1;
                    const tgt = (typeof _mixedTargets !== 'undefined' && _mixedTargets) ? _mixedTargets : { L1:0, L2:0, L3:0 };

                    const d1 = Math.abs((actual.L1||0) - (tgt.L1||0));
                    const d2 = Math.abs((actual.L2||0) - (tgt.L2||0));
                    const d3 = Math.abs((actual.L3||0) - (tgt.L3||0));
                    const ok = (d1 <= g) && (d2 <= g) && (d3 <= g);

                    if (!ok) {
                        showToast(`Mixed: totals L1/L2/L3 achieved ${actual.L1}/${actual.L2}/${actual.L3} (target ${tgt.L1}/${tgt.L2}/${tgt.L3}, ±${g} allowed)`, 'info');
                    }
                }

                function _finalStemKey(raw, marks) {
                    let t = String(raw || '');
                    t = t.replace(/^\s*(?:Q\.?\s*)?\d+\s*[:.)-]?\s*/i, '');
                    t = t.replace(/<img[^>]*>/gi, ' ')
                         .replace(/<[^>]+>/g, ' ')
                         .replace(/\s+[A-D][).:][\s\S]*$/i, '')
                         .replace(/\bAns?\s*:\s*.*$/i, '');

                    try { t = t.normalize('NFKC'); } catch (e) {}
                    t = t.replace(/[\u200B-\u200D\uFEFF]/g, '')
                         .replace(/[\u2010-\u2015\u2212]/g, '-')
                         .replace(/[\u2018\u2019\u201A\u2032]/g, "'")
                         .replace(/[\u201C\u201D\u2033]/g, '"')
                         .replace(/\u00A0/g, ' ')
                         .replace(/\s+/g, ' ')
                         .trim()
                         .toLowerCase()
                         .replace(/[.,;:!?]+$/g, '');
                    return t ? (t + '||m=' + (marks ?? '')) : '';
                }

                try {
                    if (sourceTypeGlobal === 'Question Bank') {
                        (finalPaper.subjects || []).forEach(s => {
                            const subjectSeen = new Set();

                            (s.sections || []).forEach(sec => {
                                const perSectionSeen = new Set();
                                const out = [];
                                const fallbackMarks = Number(sec.marksPerQuestion ?? 0);

                                for (const q of (sec.questions || [])) {
                                    if (q && 'srcId' in q) delete q.srcId;
                                    const stem  = q?.text ?? q?.question ?? '';
                                    const marks = Number(q?.marks ?? fallbackMarks);
                                    const k = _finalStemKey(stem, marks);

                                    if (!k) {
                                        out.push(q);
                                        continue;
                                    }
                                    if (perSectionSeen.has(k) || subjectSeen.has(k)) continue;

                                    perSectionSeen.add(k);
                                    subjectSeen.add(k);
                                    out.push(q);
                                }

                                sec.questions = out.map((q, i) => ({ ...q, number: i + 1 }));

                                if (sec.type === 'internal') {
                                    sec.numPairs = sec.questions.length;
                                } else {
                                    sec.numQuestions = sec.questions.length;
                                }
                            });
                        });
                    } else {
                        (finalPaper.subjects || []).forEach(s => {
                            (s.sections || []).forEach(sec => {
                                const fallbackMarks = Number(sec.marksPerQuestion ?? 0);
                                sec.questions = (sec.questions || []).map((q, i) => {
                                    if (q && 'srcId' in q) delete q.srcId;
                                    if (q && (q.marks == null || isNaN(q.marks))) q.marks = fallbackMarks;
                                    return { ...q, number: i + 1 };
                                });

                                if (sec.type === 'internal') {
                                    sec.numPairs = sec.questions.length;
                                } else {
                                    sec.numQuestions = sec.questions.length;
                                }
                            });
                        });
                    }
                } catch (e) {
                    console.warn('final cleanup error:', e);
                }

                sessionStorage.setItem('examPaper', JSON.stringify(finalPaper));
                window.location.href = 'exam-review.html';

            } catch (err) {
                showToast("Error building exam: " + (err.message || err), "error");
            }

            btn.disabled = false;
            btn.textContent = "Build Exam Draft";
        });
    });
});
</script>
