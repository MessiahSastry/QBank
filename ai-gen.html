          /* Page scrolls under the sticky header on all devices */
html, body {
  min-height: 100%;

@media (hover: none) and (pointer: coarse) {

// SciMentra custom alert (replaces window.alert)
(function setupSciMentraAlert(){
  const dlgId = 'dlgAppAlert';
  if (document.getElementById(dlgId)) return;

  const wrapper = document.createElement('div');
  wrapper.innerHTML = `
    <dialog id="dlgAppAlert" style="border:none;border-radius:16px;padding:0;max-width:420px;width:92vw;">
      <div style="background:#0f3d6b;color:#fff;padding:10px 14px;border-radius:16px 16px 0 0;font-weight:600;font-size:15px;text-align:left;">
        SciMentra
      </div>
      <div style="padding:14px 16px 10px 16px;font-size:14px;line-height:1.5;">
        <p id="appAlertText" style="margin:0 0 12px 0;"></p>
        <div style="text-align:right;margin-top:4px;">
          <button id="btnAppAlertOk"
                  style="background:#0f3d6b;color:#fff;border:none;border-radius:999px;padding:6px 16px;font-size:13px;font-weight:600;cursor:pointer;">
            OK
          </button>
        </div>
      </div>
    </dialog>
  `;
  const dialog = wrapper.firstElementChild;
  document.body.appendChild(dialog);

  const textEl = dialog.querySelector('#appAlertText');
  const okBtn  = dialog.querySelector('#btnAppAlertOk');

  function show(msg){
    if (textEl) textEl.textContent = msg;
    dialog.showModal();
  }

  if (okBtn) okBtn.onclick = () => dialog.close();

  // Override native alert
  window.alert = show;
})();

function __toTitleCaseWords(str) {
  return (str || "")
    .toLowerCase()
    .replace(/\s+/g, " ")
    .trim()
    .split(" ")
    .map(w => w ? (w.charAt(0).toUpperCase() + w.slice(1)) : "")

  // allow space normally; don't transform when last char is space
  const v = chapterInput.value;
  if (!v) return;

  // If the user just typed a space, do nothing.
  if (v.endsWith(" ")) return;

  // Only format when last typed char is a letter (so spaces stay)
  const last = v.slice(-1);
  if (!/[A-Za-z]/.test(last)) return;

  const cur = chapterInput.selectionStart || v.length;
  chapterInput.value = __toTitleCaseWords(v);
  chapterInput.setSelectionRange(cur, cur);
});

  chapterInput.value = __toTitleCaseWords(chapterInput.value);

function setupCustomDropdown(dropdownId, inputId, callback) {
  const dropdown = document.getElementById(dropdownId);
  if (!dropdown) return;

  const selected = dropdown.querySelector('.selected-option');
  const options = dropdown.querySelector('.dropdown-options');
  const input = document.getElementById(inputId);

  selected.onclick = (e) => {
    e.stopPropagation();
    toggleDropdown(dropdownId);
  };

  optionsContainerListener(options, selected, input, dropdown, callback);
}

function optionsContainerListener(options, selected, input, dropdown, callback) {
  options.querySelectorAll('div[data-value]').forEach(option => {
    option.onclick = () => {
      selected.textContent = option.textContent;
      input.value = option.dataset.value;
      dropdown.classList.remove('open');
      if (callback) callback(input.value);
    };
  });
}

function toggleDropdown(dropdownId) {
  const currentDropdown = document.getElementById(dropdownId);
  if(!currentDropdown) return;

  const currentlyOpen = currentDropdown.classList.contains('open');
  document.querySelectorAll('.custom-dropdown.open').forEach(d => {
    if (d.id !== dropdownId) d.classList.remove('open');
  });
  if(!currentlyOpen) currentDropdown.classList.add('open');
}

// Convert LaTeX delimiters to Markdown math that ChatGPT renders well
function __normalizeLatexDelimiters(s = '') {
  return String(s)
    // block: \[...\] -> $$...$$
    .replace(/\\\[/g, '$$').replace(/\\\]/g, '$$')
    // inline: \(...\) -> $...$
    .replace(/\\\(/g, '$').replace(/\\\)/g, '$')
    // collapse accidental $$$ or extra spaces
    .replace(/\${3,}/g, '$$')
    .replace(/[ \t]+\n/g, '\n');
}

// Decode any HTML entities that might have slipped in from your UI rendering
function __decodeEntities(s = '') {
  const d = document.createElement('textarea');
  d.innerHTML = s;
  return d.value;
}
// Wrap ( ... ) as \( ... \) ONLY when the (...) contains a LaTeX command like \frac, \sqrt, \cdot, etc.
function __fixLatex(s = '') {
  let t = String(s || '');

  t = t.replace(/\$\$([\s\S]*?)\$\$/g, '\\[$1\\]');
  t = t.replace(/\$([^\$]+)\$/g, '\\($1\\)');

  t = t.replace(/\\\(\s+/g, '\\(').replace(/\s+\\\)/g, '\\)');
  t = t.replace(/\\\[\s+/g, '\\[').replace(/\s+\\\]/g, '\\]');

  return t;
}
// Convert LaTeX-y input to plain math for ChatGPT prefill
function __toPlainMath(s = '') {
  let t = String(s);

  // remove $ / $$ and \( \) \[ \]
  t = t.replace(/\$\$?/g, '');
  t = t.replace(/\\\(|\\\)|\\\[|\\\]/g, '');

  // \frac{a}{b} -> (a)/(b)
  t = t.replace(/\\frac\s*\{([^}]*)\}\s*\{([^}]*)\}/g, '($1)/($2)');

  // exponents ^{...} -> ^...
  t = t.replace(/\^\{([^}]+)\}/g, '^$1');

  // common symbols
  t = t
    .replace(/\\times/g, '×')
    .replace(/\\cdot/g, '·')
    .replace(/\\leq/g, '≤')
    .replace(/\\geq/g, '≥')
    .replace(/\\neq/g, '≠')
    .replace(/\\pm/g, '±')
    .replace(/\\sqrt\{([^}]+)\}/g, '√($1)');

  // drop \left \right
  t = t.replace(/\\left/g, '').replace(/\\right/g, '');

  return t.replace(/[ \t]+\n/g, '\n').trim();
}

function splitMcqOptions(body) {
  if ((body.match(/^[A-D]\)/gm) || []).length >= 3) return body;

  if (/A\).+B\).+C\).+D\)/.test(body)) {
    const m = body.match(/A\)([^B]+)B\)([^C]+)C\)([^D]+)D\)(.+)/);
    if (m) {
      return [
        "A)" + m[1].trim(),
        "B)" + m[2].trim(),
        "C)" + m[3].trim(),
        "D)" + m[4].trim()
      ].join('\n');
    } else {
      return body
        .replace(/([A-D]\))/g, '\n$1')
        .replace(/^\n/, '');
    }
  }

  return body;

/* ========= NEW: Shuffle utilities for MCQs ========= */

/** Strip leading "A)"/"B)"/"C)"/"D)" labels and trim */
function __normalizeOptionText(s) {
  return String(s || '').replace(/^[A-D][).]\s*/, '').trim();
}

/** Fisher–Yates shuffle; returns a new shuffled copy */
function __shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/**
 * Randomize options A–D and remap the Ans: letters.
 * Works for Single (one letter) and Multiple (several letters).
 * Mutates qData: { options, parsedBody, parsedAnswer, fullText }
 */
function shuffleOptionsForQuestion(qData) {
  if (!qData || !Array.isArray(qData.options) || qData.options.length !== 4) return;

  // Normalize existing options (remove labels like "A) ")
  const old = qData.options.map(__normalizeOptionText);

  // Build permutation mapping: perm[newIndex] = oldIndex
  const oldIndices = [0, 1, 2, 3];
  const shuffledOldIndices = __shuffleArray(oldIndices);

  // Reorder options by shuffled indices
  const newOptions = shuffledOldIndices.map(idx => old[idx]);

  // Remap answers (if present)
  let newAnsLine = qData.parsedAnswer || null;
  const foundLetters = newAnsLine ? [...newAnsLine.matchAll(/\b([A-D])\)/g)].map(m => m[1]) : [];

  if (foundLetters.length > 0) {
    const remappedLetters = foundLetters.map(letter => {
      const oi = letter.charCodeAt(0) - 65; // original index 0..3
      // find newIndex such that perm[newIndex] === oi
      const ni = shuffledOldIndices.findIndex(orig => orig === oi);
      return String.fromCharCode(65 + ni);
    });

    if (remappedLetters.length === 1) {
      newAnsLine = `Ans: ${remappedLetters[0]})`;
    } else {
      newAnsLine = `Ans: ${remappedLetters.map(L => `${L})`).join(', ')}`;
    }
  }

  // Rebuild parsedBody with new A)/B)/C)/D) order
  const rebuilt = [
    (qData.question || '').trim(),
    `A) ${newOptions[0]}`,
    `B) ${newOptions[1]}`,
    `C) ${newOptions[2]}`,
    `D) ${newOptions[3]}`
  ].join('\n');

  // Mutate qData consistently
  qData.options = newOptions.slice(); // store de-labeled texts
  qData.parsedBody = rebuilt;
  if (newAnsLine) qData.parsedAnswer = newAnsLine;

    qData.fullText = `${qData.parsedMeta}\n${qData.parsedBody}${qData.parsedAnswer ? `\n${qData.parsedAnswer}` : ''}${qData.explanation ? `\nExplanation: ${qData.explanation}` : ''}`;
}

/* ======== END NEW shuffle utilities ======== */


/* ========== FINAL SET parser (for Paste Zone) ========== */

/**
 * Normalize “Ans:” letters into a clean array of A-D, keeping order.
 * Accepts: "Ans: C)", "Ans: A), C)", "Ans: B),D)"
 */
function __extractAnswerLetters(ansLine = '') {
  const m = String(ansLine).match(/Ans\s*:\s*([A-D\)\s,]+)/i);
  if (!m) return [];
  const letters = [];
  (m[1].match(/[A-D]\)/gi) || []).forEach(tok => {
    const L = tok[0].toUpperCase();
    if (!letters.includes(L)) letters.push(L);
  });
  return letters;
}

/** Remove “Qn:” header line and return {meta, body} */
function __splitMetaAndBody(block) {
  const lines = String(block).split('\n');
  const first = lines.shift() || '';
  return { meta: first.trim(), body: lines.join('\n').trim() };
}

/** Ensure options are split into 4 lines starting with A) B) C) D) */
function __forceOptionLines(body) {
  // already line-broken?
  if ((body.match(/^[A-D]\)/gm) || []).length >= 3) return body;

  // try to split inline A)…B)…C)…D)…
  if (/A\).+B\).+C\).+D\)/.test(body)) {
    const m = body.match(/A\)([^B]+)B\)([^C]+)C\)([^D]+)D\)(.+)/s);
    if (m) {
      return [
        `A) ${m[1].trim()}`,
        `B) ${m[2].trim()}`,
        `C) ${m[3].trim()}`,
        `D) ${m[4].trim()}`
      ].join('\n');
    }
    return body.replace(/([A-D]\))/g, '\n$1').replace(/^\n/, '');
  }

  return body;
}

/**
 * Parse a pasted FINAL SET block into our session question objects.
 * Respects the current sessionParams.questionType (MCQ Single/Multiple/Descriptive)
 */
function parseFinalSetIntoQuestions(text, sessionParams) {
  // keep only from first Qn onward (ignore any chatty intro)
  const startIdx = text.search(/\bQ\s*1\s*:/i);
  const cleaned = startIdx >= 0 ? text.slice(startIdx) : text;

  const blocks = cleaned
    .split(/\n(?=Q\s*\d+\s*:)/g)
    .map(s => s.trim())
    .filter(s => /^Q\s*\d+\s*:/i.test(s));

  const out = [];

  for (const b of blocks) {
    const { meta, body } = __splitMetaAndBody(b);

    // Build base qData
        const qData = {
      fullText: b,
      class: sessionParams.class,
      board: sessionParams.board,
      subject: sessionParams.subject,
      chapter: sessionParams.chapter,
      parsedMeta: meta,
      question: '',
      options: [],
      parsedAnswer: null,
      parsedBody: '',
      explanation: ''
    };

     if (sessionParams.questionType.startsWith('MCQ') || sessionParams.questionType.startsWith('Text Book')) {
      const explanationMatch = body.match(/Explanation\s*:\s*([\s\S]*)$/i);
      const explanationText = explanationMatch ? explanationMatch[1].trim() : '';
      const bodyWithoutExplanation = explanationMatch
        ? body.replace(/Explanation\s*:\s*[\s\S]*$/i, '').trim()
        : body;

      const ansMatch = bodyWithoutExplanation.match(/Ans\s*:\s*.*$/im);
      const ansLine = ansMatch ? ansMatch[0].trim() : null;
      const withoutAns = ansMatch ? bodyWithoutExplanation.replace(ansMatch[0], '').trim() : bodyWithoutExplanation.trim();

      const lines = withoutAns.split('\n').map(l => l.trim()).filter(Boolean);
      const qText = lines.length ? lines[0] : '';

      let optBlock = lines.slice(1).join('\n');
      optBlock = __forceOptionLines(optBlock);

      const optLines = optBlock.split('\n').map(x => x.trim()).filter(Boolean);

      const A = optLines.find(l => /^A\)/i.test(l)) || 'A) ';
      const B = optLines.find(l => /^B\)/i.test(l)) || 'B) ';
      const C = optLines.find(l => /^C\)/i.test(l)) || 'C) ';
      const D = optLines.find(l => /^D\)/i.test(l)) || 'D) ';

      qData.question = qText;
      qData.options = [A, B, C, D].map(s => s.replace(/^[A-D]\)\s*/, '').trim());

      qData.parsedAnswer = ansLine
        ? `Ans: ${__extractAnswerLetters(ansLine).map(L => `${L})`).join(', ')}`
        : null;

      qData.explanation = explanationText;

      qData.parsedBody = [
        qText,
        `A) ${qData.options[0]}`,
        `B) ${qData.options[1]}`,
        `C) ${qData.options[2]}`,
        `D) ${qData.options[3]}`
      ].join('\n');

      qData.fullText = `${qData.parsedMeta}\n${qData.parsedBody}${qData.parsedAnswer ? `\n${qData.parsedAnswer}` : ''}${qData.explanation ? `\nExplanation: ${qData.explanation}` : ''}`;

    } else {
      const explanationMatch = body.match(/Explanation\s*:\s*([\s\S]*)$/i);
      const explanationText = explanationMatch ? explanationMatch[1].trim() : '';
      const bodyWithoutExplanation = explanationMatch
        ? body.replace(/Explanation\s*:\s*[\s\S]*$/i, '').trim()
        : body;

      const finalAnswerMatch = bodyWithoutExplanation.match(/Answer\s*:\s*([\s\S]*)$/i);
      const finalAnswerText = finalAnswerMatch ? finalAnswerMatch[1].trim() : '';
      const bodyWithoutAnswer = finalAnswerMatch
        ? bodyWithoutExplanation.replace(/Answer\s*:\s*[\s\S]*$/i, '').trim()
        : bodyWithoutExplanation;

      qData.question = bodyWithoutAnswer.split('\n')[0] || '';
      qData.options = [];
      qData.parsedAnswer = finalAnswerText ? `Answer: ${finalAnswerText}` : null;
      qData.parsedBody = bodyWithoutAnswer;
      qData.explanation = explanationText;
      qData.fullText = `${qData.parsedMeta}\n${qData.parsedBody}${qData.parsedAnswer ? `\n${qData.parsedAnswer}` : ''}${qData.explanation ? `\nExplanation: ${qData.explanation}` : ''}`;
    }

    out.push(qData);
  }

  // Normalize meta to our UI style (Level, Marks, Type); renumber later in rerender
 let TYPE = sessionParams.questionType;
if (TYPE === 'Text Book (MCQ Single)')   TYPE = 'Text (Single)';
if (TYPE === 'Text Book (MCQ Multiple)') TYPE = 'Text (Multiple)';

  for (let i = 0; i < out.length; i++) {
    const m = out[i].parsedMeta;

    // Level
    const lvl = (m.match(/Level\s*([1-3])/i) || [, '?'])[1];

    // Marks
    const mkMatch = m.match(/(\d+)\s*Mark/i);
    const marks = mkMatch ? `${mkMatch[1]} Mark${mkMatch[1] === '1' ? '' : 's'}` : (TYPE.startsWith('MCQ') ? '1 Mark' : '');

    out[i].parsedMeta = `Q${i + 1}: Level ${lvl}, ${marks} [${TYPE}]`;

    // Rebuild fullText using normalized meta
    out[i].fullText = `${out[i].parsedMeta}\n${out[i].parsedBody}${out[i].parsedAnswer ? `\n${out[i].parsedAnswer}` : ''}`;
  }

  return out;
}

/* ========== END FINAL SET parser ========== */

function parseAndDisplayAiQuestions(responseText, messagesArea, sessionParams) {
  // The original logic (leave as-is for MCQ/Descriptive):
  const questionBlocks = responseText
    .split(/\n(?=Q\s*\d+:)/g)
    .map(q => q.trim())
    .filter(q => q.match(/^Q\s*\d+:/));

  if (questionBlocks.length === 0 && responseText) {
    // fallback: show as plain text ONLY if parsing failed
    appendChatMessage(responseText, 'ai', messagesArea);
    return;
  }

  const fragment = document.createDocumentFragment();

  questionBlocks.forEach((qText) => {
    const questionData = {
  fullText: qText,
  class: sessionParams.class,
  board: sessionParams.board,
  subject: sessionParams.subject,
  chapter: sessionParams.chapter,
  explanation: ''
};

    const metaMatch = qText.match(/^(Q\s*\d+:.*)/);
    if (!metaMatch) {
      console.warn("Skipping a block that is not a valid question:", qText);
      return;
    }

    let originalMeta = metaMatch[1];
    let level = "";
    let marks = "";

    let levelMatch = originalMeta.match(/Level\s*([1-3])/i);
    if (levelMatch) {
      level = `Level ${levelMatch[1]}`;
    } else {
      level = "Level ?";
    }

    const marksMatch = originalMeta.match(/(\d+)\s*Mark/i);
    if (marksMatch) {
      marks = `${marksMatch[1]} Mark${marksMatch[1] === "1" ? "" : "s"}`;
    } else {
      marks = sessionParams.questionType.startsWith("MCQ") ? "1 Mark" : "";
    }

   const metaType = (sessionParams.questionType === 'Text Book (MCQ Single)') ? 'Text (Single)'
  : (sessionParams.questionType === 'Text Book (MCQ Multiple)') ? 'Text (Multiple)'
  : sessionParams.questionType;
questionData.parsedMeta = `Q${currentSessionQuestions.length + 1}: ${level}, ${marks} [${metaType}]`;

       let rawBody = qText.substring(originalMeta.length).trim();

    if (sessionParams.questionType.startsWith('MCQ') || sessionParams.questionType.startsWith('Text Book')) {
      const explanationMatch = rawBody.match(/Explanation\s*:\s*([\s\S]*)$/i);
      const explanationText = explanationMatch ? explanationMatch[1].trim() : '';
      const bodyWithoutExplanation = explanationMatch
        ? rawBody.replace(/Explanation\s*:\s*[\s\S]*$/i, '').trim()
        : rawBody;

      const answerMatch = bodyWithoutExplanation.match(/(.*)(Ans:\s*.*)/s);

      if (answerMatch) {
        const questionAndOptions = answerMatch[1].trim();
        const lines = questionAndOptions
          .split('\n')
          .map(x => x.trim())
          .filter(x => x && x !== '<br>' && x !== '');

        questionData.question = lines[0] || '';
        questionData.options = lines.slice(1, 5).map(x => x || '');
        questionData.parsedAnswer = answerMatch[2].trim();
        questionData.parsedBody = lines.join('\n');
      } else {
        questionData.question = bodyWithoutExplanation.split('\n')[0].trim();
        questionData.options = bodyWithoutExplanation.split('\n').slice(1, 5).map(x => x.trim());
        questionData.parsedAnswer = null;
        questionData.parsedBody = bodyWithoutExplanation;
      }

      questionData.explanation = explanationText;

      // Normalize LaTeX delimiters before any option shuffling
      questionData.parsedBody = questionData.parsedBody || '';
      questionData.parsedAnswer = questionData.parsedAnswer || '';
      questionData.parsedMeta = questionData.parsedMeta || '';
      questionData.explanation = questionData.explanation || '';

      // Randomize A/B/C/D and remap the Ans: letters accordingly
      shuffleOptionsForQuestion(questionData);
    } else {
      // DESCRIPTIVE
      const explanationMatch = rawBody.match(/Explanation\s*:\s*([\s\S]*)$/i);
      const explanationText = explanationMatch ? explanationMatch[1].trim() : '';
      const bodyWithoutExplanation = explanationMatch
        ? rawBody.replace(/Explanation\s*:\s*[\s\S]*$/i, '').trim()
        : rawBody;

      const finalAnswerMatch = bodyWithoutExplanation.match(/Answer\s*:\s*([\s\S]*)$/i);
      const finalAnswerText = finalAnswerMatch ? finalAnswerMatch[1].trim() : '';
      const bodyWithoutAnswer = finalAnswerMatch
        ? bodyWithoutExplanation.replace(/Answer\s*:\s*[\s\S]*$/i, '').trim()
        : bodyWithoutExplanation;

      questionData.question = bodyWithoutAnswer.trim().split('\n')[0] || '';
      questionData.options = [];
      questionData.parsedAnswer = finalAnswerText ? `Answer: ${finalAnswerText}` : null;
      questionData.parsedBody = bodyWithoutAnswer.trim();
      questionData.explanation = explanationText;
    }

    currentSessionQuestions.push(questionData);
    const questionEl = createQuestionElement(questionData, currentSessionQuestions.length - 1);
    fragment.appendChild(questionEl);
  });

  messagesArea.appendChild(fragment);
  if (window.MathJax) MathJax.typesetPromise([messagesArea]);
  messagesArea.scrollTop = messagesArea.scrollHeight;
}

function createQuestionElement(qData, index) {
  const questionEl = document.createElement('div');
  questionEl.className = 'message ai-question-item';
  questionEl.dataset.sessionQuestionIndex = index;

  questionEl.innerHTML = `
    <div class="question-meta-ai">${qData.parsedMeta}</div>
    <div class="question-text-ai">${(qData.parsedBody || '').replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>
    ${qData.parsedAnswer ? `<div class="temp-answer answer-box" style="display:block; margin-top:8px;"><b>${qData.parsedAnswer.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</b></div>` : ''}
    ${qData.explanation ? `<div class="temp-answer" style="display:block; margin-top:8px;"><b>Explanation:</b> ${(qData.explanation || '').replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>` : ''}
    <div class="question-actions">
      <button class="q-action-btn" title="Options"><i class="fas fa-ellipsis-v"></i></button>
    </div>
  `;

  const actionButton = questionEl.querySelector('.q-action-btn');

  actionButton.addEventListener('click', (e) => {
    e.stopPropagation();

    const existingMenu = document.querySelector('.actions-menu');
    if (existingMenu) existingMenu.remove();

    const menu = document.createElement('div');
    menu.className = 'actions-menu';
    menu.innerHTML = `
      <button class="menu-show-answer-btn">Show Answer</button>
      <button class="menu-edit-btn">Edit</button>
      <button class="menu-delete-btn">Delete</button>
    `;

    const isAnswerShowing = questionEl.querySelector('.temp-answer');
    if (isAnswerShowing) {
      const buttonInMenu = menu.querySelector('.menu-show-answer-btn');
      buttonInMenu.textContent = 'Hide Answer';
    }

    questionEl.appendChild(menu);

    menu.querySelector('.menu-show-answer-btn').onclick = async (event) => {
      event.stopPropagation();
      try {
        const q = currentSessionQuestions[index];
        const prompt = buildChatGptPromptFromQuestion(q, lastSessionParams || {});
        await openInChatGptWithPrefill(prompt);
      } catch (err) {
        __qb_toast('Could not open ChatGPT.');
        console.error(err);
      }
      menu.remove();
    };

    menu.querySelector('.menu-edit-btn').onclick = () => {
      showEditPopupForQuestion(index);
      menu.remove();
    };

    menu.querySelector('.menu-delete-btn').onclick = () => {
      if (confirm('Are you sure you want to delete this question?')) {
        currentSessionQuestions.splice(index, 1);
        rerenderAllQuestions();
      }
      menu.remove();
    };
  });

  return questionEl;
}

function rerenderAllQuestions() {
  const messagesArea = document.getElementById('chat-messages-area');
  messagesArea.querySelectorAll('.ai-question-item').forEach(item => item.remove());

  const fragment = document.createDocumentFragment();

  currentSessionQuestions.forEach((q, i) => {
    // For comprehensives, we need a different renderer
    if (q.parsedMeta && q.parsedMeta.includes("[Comprehensive]")) {
      // Renumber meta
      const metaPartsMatch = q.parsedMeta.match(/Q\s*\d+:\s*(.*)/i);
      const details = metaPartsMatch ? metaPartsMatch[1] : '';
      q.parsedMeta = `Q${i + 1}: ${details}`;

      // Build element (copy from parseAndDisplayAiQuestions)
      const blockEl = document.createElement('div');
      blockEl.className = 'message ai-question-item';
      blockEl.dataset.sessionQuestionIndex = i;

      // Build MCQ HTMLs
      const mcqHtml = q.mcqs.map((mcq, k) => {
        // Remove leading Qn: from mcq.body if present (Q1:, Q2:, etc.)
        let cleanBody = mcq.body.replace(/^Q\d+:\s*/i, '').replace(/Ans:.*/, '').trim();

        return `
          <div class="question-text-ai" style="margin-top:8px; text-align:left;">
            <b>Q${k+1}.</b> ${__fixLatex(cleanBody.replace(/</g,"&lt;").replace(/>/g,"&gt;"))}
            <div class="temp-answer" style="display:none; margin-top:3px; color:#5d4037;">
              ${mcq.answer ? mcq.answer : ''}
            </div>
          </div>
        `;
      }).join('');

      blockEl.innerHTML = `
        <div class="question-meta-ai">${q.parsedMeta}</div>
        <div class="question-text-ai" style="white-space:pre-line; margin-bottom:8px;"><b>Passage:</b> ${__fixLatex(q.passage || '')}</div>
        ${mcqHtml}
        <div class="question-actions">
          <button class="q-action-btn" title="Options"><i class="fas fa-ellipsis-v"></i></button>
        </div>
      `;

      blockEl.querySelector('.q-action-btn').onclick = (e) => {
        e.stopPropagation();

        const existingMenu = document.querySelector('.actions-menu');
        if (existingMenu) existingMenu.remove();

        const menu = document.createElement('div');
        menu.className = 'actions-menu';
        menu.innerHTML = `
          <button class="menu-show-answer-btn">Show Answer</button>
          <button class="menu-edit-btn">Edit</button>
          <button class="menu-delete-btn">Delete</button>
        `;

        blockEl.appendChild(menu);

        menu.querySelector('.menu-show-answer-btn').onclick = () => {
          const q = currentSessionQuestions[i]; // comprehensive data
          const meta = q.parsedMeta || '';
          const cls  = q.class  || (lastSessionParams && lastSessionParams.class)  || '';
          const subj = q.subject|| (lastSessionParams && lastSessionParams.subject)|| '';
          const chap = q.chapter|| (lastSessionParams && lastSessionParams.chapter)|| '';

          let prompt = `Please solve and explain clearly.\n`;
          const metaLineParts = [
            cls  && `Class: ${cls}`,
            subj && `Subject: ${subj}`,
            chap && `Chapter: ${chap}`,
            meta && meta.replace(/^Q\d+:\s*/, '').trim()
          ].filter(Boolean).join(' · ');
          if (metaLineParts) prompt += metaLineParts + `\n\n`;

          prompt += `Passage:\n${q.passage}\n\n`;

          if (Array.isArray(q.mcqs) && q.mcqs.length) {
            prompt += `Questions:\n`;
            q.mcqs.forEach((mcq, idx) => {
              const cleanBody = (mcq.body || '').replace(/^Q\d+:\s*/i, '').trim();
              prompt += `\nQ${idx + 1}.\n${cleanBody}\n`;
              if (mcq.answer) {
                prompt += `(If you know, the key says: ${mcq.answer})\n`;
              }
            });
            prompt += `\nRespond with answers for each MCQ (e.g., A–D) and brief step-by-step explanations.`;
          } else {
            prompt += `Respond with the final answers and brief explanations.`;
          }

          openInChatGptWithPrefill(prompt);
          menu.remove();
        };

        menu.querySelector('.menu-edit-btn').onclick = () => {
          showEditPopupForComprehensive(i);
          menu.remove();
        };

        menu.querySelector('.menu-delete-btn').onclick = () => {
          if (confirm('Are you sure you want to delete this comprehensive?')) {
            currentSessionQuestions.splice(i, 1);
            rerenderAllQuestions();
          }
          menu.remove();
        };
      };

      fragment.appendChild(blockEl);

    } else {
      // Normal question
      const metaPartsMatch = q.parsedMeta.match(/Q\s*\d+:\s*(.*)/i);
      const details = metaPartsMatch ? metaPartsMatch[1] : '';
      q.parsedMeta = `Q${i + 1}: ${details}`;

      const questionEl = createQuestionElement(q, i);
      fragment.appendChild(questionEl);
    }
  });

  messagesArea.appendChild(fragment);
  if (window.MathJax) MathJax.typesetPromise([messagesArea]);
}

function parseMetaLine(metaLine) {
  const meta = { difficulty: null, level: null, marks: null };

  const levelMatch = metaLine.match(/Level\s*(\d+)/i);
  const marksMatch = metaLine.match(/(\d+)\s*Mark(s?)/i);

  if (levelMatch) {
    meta.level = parseInt(levelMatch[1], 10);
    meta.difficulty = `Level ${levelMatch[1]}`;
  }

  if (marksMatch) {
    meta.marks = parseInt(marksMatch[1], 10);
  }

  return meta;
}

async function getNextQuestionNumber(className, subjectName, chapterName) {
  const query = db.collection("questions")
    .where("class", "==", className)
    .where("subject", "==", subjectName)
    .where("chapter", "==", chapterName)
    .orderBy("questionNumber", "desc")
    .limit(1);

  const snapshot = await query.get();
  if (snapshot.empty) return 1;

  const lastQuestion = snapshot.docs[0].data();
  return (lastQuestion.questionNumber || 0) + 1;
}

function getTextSimilarity(a, b) {
  if (!a || !b) return 0; // If either is missing, return 0 similarity

  a = String(a).toLowerCase().replace(/\s+/g, ' ').trim();
  b = String(b).toLowerCase().replace(/\s+/g, ' ').trim();

  const aWords = new Set(a.split(' '));
  const bWords = new Set(b.split(' '));
  const common = [...aWords].filter(w => bWords.has(w));

  return common.length / Math.max(aWords.size, bWords.size);
}

    const qText  = document.getElementById('edit-q-text').value.trim();
    const optA   = document.getElementById('edit-q-optA').value.trim();
    const optB   = document.getElementById('edit-q-optB').value.trim();
    const optC   = document.getElementById('edit-q-optC').value.trim();
    const optD   = document.getElementById('edit-q-optD').value.trim();
    const answer = document.getElementById('edit-q-answer').value.trim();

    // Simple validation (optional)
    if (!qText || !optA || !optB || !optC || !optD || !answer) {
      alert("All fields are required.");
      return;
    }

    // Update data
    qData.question = qText;
    qData.options  = [optA, optB, optC, optD];
    qData.parsedBody = [qText, `A) ${optA}`, `B) ${optB}`, `C) ${optC}`, `D) ${optD}`].join('\n');
    qData.parsedAnswer = `Ans: ${answer}`;
        qData.fullText = `${qData.parsedMeta}\n${qData.parsedBody}\n${qData.parsedAnswer}${qData.explanation ? `\nExplanation: ${qData.explanation}` : ''}`;

    // Close popup and re-render
    popup.remove();
    rerenderAllQuestions();
  };
}
