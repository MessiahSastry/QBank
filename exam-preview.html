    <div id="page-container">

 <script>
  function formatSubQuestions(text) {
  if (!text) return '';

 let t = String(text)
  .replace(/\r/g, '')
  .replace(/&nbsp;/gi, ' ')
  .replace(/<br\s*\/?>/gi, '\n')
  .replace(/<\/p>/gi, '\n')
  .replace(/<p[^>]*>/gi, '')          // ← remove opening <p> so (A)/(B) are detected
  .replace(/<div[^>]*>/gi, '\n')
  .replace(/<\/div>/gi, '')
  .replace(/<li[^>]*>/gi, '\n')
  .replace(/<\/li>/gi, '')
  .replace(/<ol[^>]*>|<ul[^>]*>|<\/ol>|<\/ul>/gi, '')
  .trim();


    const lines = t.split('\n').map(s=>s.trim()).filter(Boolean);
  const A_RE = /^\s*(?:<[^>]+>\s*)*(?:\(\s*A\s*\)|A[\)\.\:])\s*/i;
  const B_RE = /^\s*(?:<[^>]+>\s*)*(?:\(\s*B\s*\)|B[\)\.\:])\s*/i;
// (kept same tokens; leaving here to confirm you’re matching A) / (A) / A. / A: even if wrapped)


  let aIdx=-1, bIdx=-1;
  for (let i=0;i<lines.length;i++){
    if (aIdx===-1 && A_RE.test(lines[i])) aIdx=i;
    if (aIdx!==-1 && bIdx===-1 && B_RE.test(lines[i])) { bIdx=i; break; }
  }

   if (aIdx!==-1 && bIdx!==-1 && bIdx>aIdx){

    const stripLead = s => s.replace(A_RE,'').replace(B_RE,'').trim();
    const dropWrappedAB = s => s.replace(/\n\s*(?:\(\s*[AB]\s*\)|[AB][\)\.\:])\s+/gi, '\n');

    const aTxt = dropWrappedAB([lines[aIdx].replace(A_RE,''), ...lines.slice(aIdx+1,bIdx)].join('\n'));
    const bTxt = dropWrappedAB([lines[bIdx].replace(B_RE,''), ...lines.slice(bIdx+1)].join('\n'));

       return `
      <div class="pair-a"><span class="label">(A)</span><span class="txt">${aTxt}</span></div>
      <div class="pair-or">(OR)</div><div class="ab-gap"></div>
      <div class="pair-b"><span class="label">(B)</span><span class="txt">${bTxt}</span></div>
    `;
  }

  // Fallback: (A)…(B)… present inside a single line/block
  const abMatch = /\bOR\b/i.test(t) ? null : t.match(/\(\s*A\s*\)\s*([\s\S]*?)\s*\(\s*B\s*\)\s*([\s\S]*)$/i);
if (abMatch) {
  const aTxt = abMatch[1].trim();
  const bTxt = abMatch[2].trim();
    return `
      <div class="pair-a"><span class="label">(A)</span><span class="txt">${aTxt}</span></div>
      <div class="pair-or">(OR)</div><div class="ab-gap"></div>
      <div class="pair-b"><span class="label">(B)</span><span class="txt">${bTxt}</span></div>
    `;
  }

  // 🔁 Fallback: A and B inside a single block (no newlines detected)
  const inline = /\bOR\b/i.test(t) ? null : t.match(/\(\s*A\s*\)\s*([\s\S]*?)\s*\(\s*B\s*\)\s*([\s\S]*)$/i);
if (inline){
    const aTxt = inline[1].trim();
    const bTxt = inline[2].trim();
    return `
      <div class="pair-a"><span class="label">(A)</span><span class="txt">${aTxt}</span></div>
      <div class="pair-or">(OR)</div><div class="ab-gap"></div>
      <div class="pair-b"><span class="label">(B)</span><span class="txt">${bTxt}</span></div>
    `;
  }

   // Default: wrap each remaining line
  return lines.map(line => `<div>${line}</div>`).join('');
} // <-- end of formatSubQuestions

// --- helper: force "(OR)" between (A) and (B) ---
function forceOrAB(html){
  if (!html) return '';
  // already has (OR) or explicit node
  if (/\(\s*OR\s*\)/i.test(html) || /\bclass\s*=\s*["']pair-or["']/.test(html)) return html;

  // pair markup present but missing (OR)
  if (/\bpair-a\b/.test(html) && /\bpair-b\b/.test(html)) {
    return html.replace(
      /(<\/div>\s*)(<div[^>]*class=["']pair-b\b)/i,
      '$1<div class="pair-or">(OR)</div><div class="ab-gap"></div>$2'
    );
  }

  // raw (A) ... (B) in one block
  const m = html.match(/\(\s*A\s*\)\s*([\s\S]*?)\s*\(\s*B\s*\)\s*([\s\S]*)$/i);
  if (m) {
    const a = m[1].trim(), b = m[2].trim();
    return `
      <div class="pair-a"><span class="label">(A)</span><span class="txt">${a}</span></div>
      <div class="pair-or">(OR)</div><div class="ab-gap"></div>
      <div class="pair-b"><span class="label">(B)</span><span class="txt">${b}</span></div>
    `;
  }
  return html;
}

// shim so older calls keep working
function ensureOrAB(html){
  return forceOrAB(html);
}

  function autoLatexAll(str) {
  if (!str) return '';

  // normalize legacy markers used by older content
  str = str.replace(/\$begin\{pmatrix\}/g, '\\begin{pmatrix}')
           .replace(/\$end\{pmatrix\}/g, '\\end{pmatrix}')
           .replace(/\$pmatrix\$/g, '')
           .replace(/Send/g, '');

  // If author already delimited math, just normalize $...$ → \( ... \)
  if (/\$[^$]+\$|\\\([^]*?\\\)|\\\[[\s\S]*?\\\]/.test(str)) {
    return str.replace(/\$([^\$]+)\$/g, '\\($1\\)');
  }

  // Only auto-wrap SHORT symbolic fragments, never full sentences
  const words = str.trim().split(/\s+/).length;
  const hasMathTokens = /(\^|_|\\frac|\\sqrt|\\binom|\\sum|\\int|\\lim|\\log|\\sin|\\cos|\\tan|[≤≥≈≠∞√])/.test(str);
  const isDimension = /\[[^\]]+\]/.test(str); // e.g. [M^0 L^2 T^-2]
  const looksAlgebra = /\b[A-Za-z]\s*\^\s*\d\b|[A-Za-z]\d/.test(str) || /\b[xyz]\s*=/.test(str);

  if ((isDimension || hasMathTokens || looksAlgebra) && words <= 6) {
    return `\\(${str}\\)`;
  }
  return str;
}

function removeMetaPrefix(str) {
  return str
    .replace(/^Q\d+:\s*Level\s*\d+,\s*\d+\s*Mark[s]?\s*/i, '')
    .replace(/^Q\d+:\s*Level\s*\d+,\s*/i, '')
    .replace(/^Q\d+:\s*\d+\s*Mark[s]?\s*/i, '')
    .replace(/^Q\d+:\s*/i, '');
}
   function removeMetaTags(str) {
  // Removes [Descriptive], [MCQ], [Multiple], etc. at the beginning or after numbers
  return (str || '').replace(/^\s*\[[^\]]+\]\s*/i, '').replace(/^\d+\.\s*\[[^\]]+\]\s*/i, '');
}
   function removeMetaLines(str) {
  // Remove any line that starts with Qxx: Level, Marks, [Type], etc.
  return str.replace(/Q\d{1,3}.*\n?/g, '');
}
   function formatDate(dateStr) {
    if (!dateStr) return '';
    const [year, month, day] = dateStr.split('-');
    return `${day}-${month}-${year}`;
}
   function removeDuplicateLines(str) {
  return str
    .split('\n')
    .filter((line, idx, arr) => 
      line.trim() && arr.findIndex(l => l.trim() === line.trim()) === idx
    )
    .join('\n');
}
const schoolLogo1 = 'schoollogo1.png';
const schoolLogo2 = 'schoollogo2.png';
let exam = JSON.parse(sessionStorage.getItem('finalExamData') || '{}');
let useTableLayout = false;
function formatExamTime(mins) {
  mins = parseInt(mins);
  if (isNaN(mins) || mins <= 0) return '';

  const hours = Math.floor(mins / 60);
  const remainder = mins % 60;
  let fraction = '';

  if (remainder === 15) fraction = '¼';
  else if (remainder === 30) fraction = '½';
  else if (remainder === 45) fraction = '¾';

  let result = '';
  if (hours === 0) {
    result = fraction ? `${fraction} hour` : `${mins} min`;
  } else {
    result = fraction ? `${hours}${fraction} hours` : `${hours} hour${hours > 1 ? 's' : ''}`;
  }

  return result;
}

function fitsInLine(option1, option2, maxWidth = 700) {
    let dummy = document.createElement('span');
    dummy.style.cssText = 'visibility:hidden;position:absolute;white-space:nowrap;padding:0;margin:0;border:none;font-family:Times New Roman, Times, serif;font-size:1.15em;';
    dummy.textContent = option1 + " " + option2;
    document.body.appendChild(dummy);
    let fits = dummy.offsetWidth < maxWidth;
    document.body.removeChild(dummy);
    return fits;
}
  function renderOptionsLayout(optionLines, hostNode) {
  if (!Array.isArray(optionLines) || optionLines.length === 0) return '';

  // Non-4 options → always stacked
  if (optionLines.length !== 4) {
    return optionLines.map(opt =>
      `<div style="margin-bottom:2px;margin-left:2px;">${String(opt).trim().replace(/\n/g,'<br>')}</div>`
    ).join('');
  }

  // --- Bank.html style: measure using printable width (PDF-stable) ---
  const pageEl =
    (hostNode && hostNode.closest && hostNode.closest('.a4-page')) ||
    document.querySelector('.a4-page') ||
    document.body;

  const pwRaw = (pageEl && pageEl.getBoundingClientRect().width) || 820;
  const pw = Math.min(pwRaw, 820); // preview needs wider cap

  function measureRowHTML(html) {
    const d = document.createElement('div');
    d.style.cssText = `
      visibility:hidden; position:absolute; left:-99999px; top:0;
      white-space:nowrap; padding:0; margin:0; border:none;
      font-family:Times New Roman,Times,serif; font-size:11pt;
    `;
    d.innerHTML = html;
    document.body.appendChild(d);
    const w = d.getBoundingClientRect().width;
    d.remove();
    return w;
  }

  // 1) Try all 4 in one line
  const fourRowHTML = optionLines.map(opt =>
    `<span style="display:inline-block;margin-right:32px;min-width:70px;">${String(opt).trim()}</span>`
  ).join('');

 // ✅ LaTeX exists? Allow 4-in-one-row ONLY if LaTeX options are SHORT (√, simple fractions etc.)
const hasLatex = optionLines.some(opt => /\\\(|\\\[|\$/.test(String(opt)));

const isShortLatexSet = hasLatex && optionLines.every(opt => {
  const s = String(opt)
    .replace(/^([A-D])\)\s*/,'')          // remove A) label
    .replace(/\\\(|\\\)|\\\[|\\\]/g,'')   // remove \( \) \[ \]
    .replace(/\$/g,'')                   // remove $
    .replace(/\\[a-zA-Z]+/g,'x')          // commands → x (keeps length realistic)
    .replace(/[{}]/g,'')
    .trim();
  return s.length <= 10;                 // ✅ short math like √13, 4/3, 2√5 etc.
});

const maxFour = Math.max(420, pw - 20);

// ✅ Allow 4-in-row if no LaTeX OR if LaTeX is short-set
const fitsFour = ( (!hasLatex || isShortLatexSet) && (measureRowHTML(fourRowHTML) <= maxFour) );

if (fitsFour) {
  return `
    <div style="display:flex;flex-wrap:nowrap;gap:26px;margin-bottom:3px;width:100%;margin-left:2px;">
      ${optionLines.map(opt => `<span style="min-width:70px;display:inline-block;white-space:nowrap;">${String(opt).trim()}</span>`).join('')}
    </div>`;
}

  // 2) Else try 2+2 ONLY if each option fits comfortably in half width
  const colGap = 24;
  const halfWidth = Math.max(240, (pw - colGap) / 2);

  const optWidths = optionLines.map(opt => measureRowHTML(
    `<span style="display:inline-block;font-family:Times New Roman,Times,serif;font-size:11pt;">${String(opt).trim()}</span>`
  ));

  const anyTooWideForTwoCols = optWidths.some(w => w > halfWidth);

  if (!anyTooWideForTwoCols) {
    return `
      <div class="opt-grid-2x2" style="display:grid;grid-template-columns:1fr 1fr;column-gap:${colGap}px;row-gap:2px;margin-bottom:2px;width:100%;margin-left:2px;">

        <span style="min-width:70px;display:block;width:100%;">${String(optionLines[3]).trim()}</span>
      </div>`;
  }

  // 3) Else one-by-one (4 lines)
  return optionLines
    .map(opt => `<div style="margin-bottom:2px;margin-left:2px;">${String(opt).trim().replace(/\n/g,'<br>')}</div>`)
    .join('');
}

function formatQuestionText(text) {
    text = text.replace(/^\d+\.\s*/, '');
    text = text.replace(/^.*?,\s*\d+\s+Marks?\s*/i, '');
    text = text.replace(/^Q\d+:[^A-Za-z]*?Marks?\s*/i, '');
    text = text.replace(/^Q\d+:[^A-Za-z0-9]*\s*/, '');
    text = text.replace(/\s*Ans:\s*[A-D]\)?\.?$/, '');
    if (text.includes('A)') && text.includes('B)')) {
        return text.replace(/\s*A\)/g, '\nA)').replace(/\s*B\)/g, '\nB)').replace(/\s*C\)/g, '\nC)').replace(/\s*D\)/g, '\nD)');
    }
    return text;
}
function stripLeadingLabel(s) {
  let t = String(s).trim();
  // Remove any leading labels: A) / a. / (A) / i) / ii) / iv) / vi) / ix) etc.
  const labelRe = /^\s*[\(\[]?\s*(?:[A-Da-d]|(?:iv|vi|ix|v?i{1,3}))\s*[)\.: -]\s*/i;
  while (labelRe.test(t)) t = t.replace(labelRe, '');
  return t;
}
  function stripABPrefix(html) {
  if (html == null) return '';
  let s = String(html)
    .replace(/&nbsp;/gi, ' ')
    .replace(/^\s+(?=<)/, ''); // drop spaces before a leading tag

  // Allow any number of leading tags before the label: <b>(A)</b>, <span>A)</span>, etc.
  const RE = /^\s*(?:<[^>]+>\s*)*(?:\(\s*[AB]\s*\)|[AB][)\.:])\s*/i;

  // Strip repeatedly in case there are nested/duplicated prefixes
  while (RE.test(s)) s = s.replace(RE, '');
  return s.trim();
}

}

// Inserts a gap + editable OR box when (A)... and (B)... exist in the SAME block (even with <br>)
function insertManualOrBoxes(root=document){
  (root.querySelectorAll('.question-text')||[]).forEach(qt=>{
   if (qt.querySelector('.pair-or')) return;
// do NOT return just because pairs exist; we still have to insert the OR

    // Text-first parse (robust across stray tags/BRs)
    const raw = (qt.innerHTML || '')
      .replace(/<\/p>/gi,'\n').replace(/<p[^>]*>/gi,'')
      .replace(/<br\s*\/?>/gi,'\n')
      .replace(/<div[^>]*>/gi,'\n').replace(/<\/div>/gi,'')
      .replace(/\r/g,'');
    const lines = raw.split('\n').map(s=>s.trim()).filter(Boolean);

    const A_RE = /^\(\s*A\s*\)|^A[\)\.\:]/i;
    const B_RE = /^\(\s*B\s*\)|^B[\)\.\:]/i;

    let aIdx = lines.findIndex(l=>A_RE.test(l));
    let bIdx = -1;
    if (aIdx !== -1){
      for (let i=aIdx+1;i<lines.length;i++){ if (B_RE.test(lines[i])) { bIdx=i; break; } }
    }
    if (aIdx !== -1 && bIdx !== -1){
      const aHTML = lines[aIdx].replace(A_RE,'').trim() + (bIdx-aIdx>1? ('\n'+lines.slice(aIdx+1,bIdx).join('\n')) : '');
      const bHTML = lines[bIdx].replace(B_RE,'').trim() + (bIdx<lines.length-1? ('\n'+lines.slice(bIdx+1).join('\n')) : '');
      qt.innerHTML =
        `<div class="pair-a"><span class="label">(A)</span><span class="txt">${aHTML}</span></div>`+
        `<div class="pair-or">(OR)</div><div class="ab-gap"></div>`+
        `<div class="pair-b"><span class="label">(B)</span><span class="txt">${bHTML}</span></div>`;
    }
  });

// This function OUTSIDE of the above
async function renderMathJaxToImages(containerSelector) {
  const container = document.querySelector(containerSelector);
  if (!container) return;

  // Wait for MathJax to finish rendering equations
  if (window.MathJax && typeof window.MathJax.typesetPromise === 'function') {
    await window.MathJax.typesetPromise([container]);
  }
  // Find all MathJax elements and convert them to images
  const mathElements = container.querySelectorAll('mjx-container');
  for (const el of mathElements) {
    // Use dom-to-image to convert each equation to a PNG
    const dataUrl = await domtoimage.toPng(el, { bgcolor: '#fff' });
    // Create <img> element and replace the MathJax SVG
    const img = document.createElement('img');
    img.src = dataUrl;
    img.style.verticalAlign = 'middle';
    img.style.display = 'inline-block';
    img.style.maxHeight = '32px';
    el.parentNode.replaceChild(img, el);
  }
}

function updateMargin() {
  const cm = marginSlider.value;

}
