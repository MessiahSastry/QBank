        // --- Modern dropdown for Auth Modal ---
        function setupModernDropdown(dropdownId, selectedId, listId) {
    const dropdown = document.getElementById(dropdownId);
    const selected = document.getElementById(selectedId);
    const list = document.getElementById(listId);
    if (!dropdown || !selected || !list) return;
    // Show/hide dropdown
    selected.onclick = function(e) {
        e.stopPropagation();
        list.style.display = (list.style.display === 'none' || list.style.display === '') ? 'block' : 'none';
    };
    // Select option
    list.querySelectorAll('div[data-value]').forEach(opt => {
        opt.onclick = function(e) {
            e.stopPropagation();
            selected.textContent = this.textContent;
            selected.dataset.value = this.dataset.value;
            list.style.display = 'none';
            fetchAndShowStudentName();
        };
    });
    // Hide on outside click
    document.addEventListener('click', function handler(e) {
        if (!dropdown.contains(e.target)) {
            list.style.display = 'none';
        }
    });
}
        // Setup dropdowns when DOM ready
        document.addEventListener("DOMContentLoaded", function() {
            // 1. Fill classes
            const classList = [
                "3rd Class", "4th Class", "5th Class", "6th Class",
                "7th Class", "8th Class", "9th Class", "10th Class"
            ];
            const classDropdown = document.getElementById("dropdown-class-list");
            classDropdown.innerHTML = ""; // Clear
            classList.forEach(cls => {
                const div = document.createElement("div");
                div.className = "dropdown-option";
                div.setAttribute("data-value", cls);
                div.textContent = cls;
                classDropdown.appendChild(div);
            });
        
            // 2. Fill sections
            const sectionList = [
                "A Section", "A Section (IPD)", "B Section", "C Section"
            ];
            const sectionDropdown = document.getElementById("dropdown-section-list");
            sectionDropdown.innerHTML = ""; // Clear
            sectionList.forEach(sec => {
                const div = document.createElement("div");
                div.className = "dropdown-option";
                div.setAttribute("data-value", sec);
                div.textContent = sec;
                sectionDropdown.appendChild(div);
            });
        
            // 3. Setup dropdown functionality
            setupModernDropdown('class-dropdown', 'selected-class', 'dropdown-class-list');
            setupModernDropdown('section-dropdown', 'selected-section', 'dropdown-section-list');

function handlePhoneInput() {

function fetchAndShowLeaderboard() {

  if (sec) q = q.where("section", "==", sec);
  
  q.get()
   .then((querySnapshot) => {
      // Collect all results
      const byPhone = {};
      querySnapshot.forEach(doc => {
        const d = doc.data() || {};
        const key = d.phone || d.name || 'Student';
        if (!byPhone[key]) byPhone[key] = [];
        byPhone[key].push({
          name: (d.name && d.name.trim() && d.name !== "Student") ? d.name : (d.phone || "Student"),
          phone: d.phone || "",
          score: Number(d.score || 0),
          time: Number(d.time || d.timeTaken || d.timer || 0),
          _ts: d.timestamp && d.timestamp.toDate ? d.timestamp.toDate().getTime() : 0
        });
      });

      // Pick best attempt per student
      let leaderboard = Object.values(byPhone).map(arr => {
        arr.sort((a,b) => (b.score - a.score) || (a.time - b.time) || (a._ts - b._ts));
        const best = arr[0];
        const min = Math.max(1, Math.ceil((best.time || 0) / 60));
        return { name: best.name, phone: best.phone, score: best.score, attempts: arr.length, timeMinutes: String(min) };
      });

      // Final ordering (client-side)
      leaderboard.sort((a,b) => (b.score - a.score) || (parseInt(a.timeMinutes) - parseInt(b.timeMinutes)));

      function getMedal(rank) {
        if (rank === 1) return '<span style="font-size:1.5em;">🥇</span>';
        if (rank === 2) return '<span style="font-size:1.5em;">🥈</span>';
        if (rank === 3) return '<span style="font-size:1.5em;">🥉</span>';
        return `<span style="font-size:1.3em;font-weight:bold;color:#fff;background:#0f3d6b;border-radius:50%;display:inline-block;width:1.8em;height:1.8em;text-align:center;line-height:1.8em;">${rank}</span>`;
      }

      const currentPhone = document.getElementById('student-phone')?.value || '';
      const rows = leaderboard.map((d, idx) => `
        <div class="leader-row${d.phone === currentPhone ? ' current-user' : ''}">
          <span class="leader-medal">${getMedal(idx+1)}</span>
          <span class="leader-name" title="${d.name}">${d.name}</span>
          <span class="leader-score">${d.score} /${d.timeMinutes} (${d.attempts})</span>
        </div>
      `);

      const html = `
        <div class="leaderboard-box">
          <div class="leaderboard-title" style="font-size:1.14em;text-align:left;font-weight:600;">
            St. Patrick's Challengers
            <span style="float:right;font-size:0.95em;color:#e0eaff;font-weight:400;">Score / time (attempts)</span>
          </div>
          <div class="leaderboard-list">
            ${rows.join("") || `<div style="background:#fff;border-radius:12px;padding:14px;text-align:center;color:#185496;">No attempts yet.</div>`}
          </div>
        </div>`;
      showLeaderboard(html);
    })
    .catch(err => {
      console.error('Leaderboard error:', err);
      showLeaderboard(
        `<div class="leaderboard-box">
           <div class="leaderboard-title">St. Patrick's Challengers</div>
           <div style="background:#fff;border-radius:12px;padding:14px;text-align:center;color:#c82333;">
             Couldn't load leaderboard.<br>${err && err.message ? err.message : err}
           </div>
         </div>`
      );
    });
}

// ---- Leaderboard Modal Show/Hide ----
function showLeaderboard(html) {
    document.getElementById('leaderboard-popup-block').innerHTML = html || '';
    document.getElementById('leaderboard-modal').style.display = 'flex';
}
const closeLb = document.getElementById('close-leaderboard-btn');
if (closeLb) {
  closeLb.onclick = function() {
    const lb = document.getElementById('leaderboard-modal');
    if (lb) lb.style.display = 'none';
  };
}

function saveCurrentProgress() {
    const { cls: classVal, sec: sectionVal, ph: phoneVal } = getShared();
    if (phoneVal.length !== 10) return; // not authenticated → skip write
    const quizId = new URLSearchParams(window.location.search).get("quiz");
    const academicYear = getActiveAcademicYear();   // <-- add this line
    let correct = 0;
    quiz.questions.forEach((q, i) => {
        let ansIdx = (typeof q.shuffledAnswerIdx === "number") ? q.shuffledAnswerIdx : letterToIdx(q.answer);
        if (userAnswers[i] === ansIdx) correct++;
    });

    // This will update the user's result after every question
    db.collection("quizResults")
      .where("quizId", "==", quizId)
      .where("phone", "==", phoneVal)
      .where("academicYear", "==", academicYear)
      .get()
      .then(snapshot => {
          if (!snapshot.empty) {
              // Update the existing result (keep only latest one per user)
              const timeTaken = Math.floor((Date.now() - quizStart) / 1000);
           snapshot.docs[0].ref.set({
  name: window.studentName,
  academicYear,
  class: classVal,
  section: sectionVal,
  score: correct,
  time: timeTaken,
  timestamp: firebase.firestore.FieldValue.serverTimestamp(),
  leaderboardVisible: true
}, { merge: true });
          } else {
                const timeTaken = Math.floor((Date.now() - quizStart) / 1000); // Calculate time taken in seconds
                db.collection("quizResults").add({
  quizId: quizId,
  academicYear,
  class: classVal,
  section: sectionVal,
  phone: phoneVal,
  name: window.studentName,
  score: correct,
  time: Math.floor((Date.now() - quizStart) / 1000),
  timestamp: firebase.firestore.FieldValue.serverTimestamp(),
  leaderboardVisible: true
});
          }
      });
}
    
    </script>
